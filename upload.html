<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3Dキャプチャ アップロード</title>
<style>
  body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 24px; max-width: 480px; }
  h1 { font-size: 20px; }
  label { display: block; font-size: 13px; color: #555; margin-top: 16px; margin-bottom: 4px; }
  select, input[type="text"], input[type="file"] {
    width: 100%; padding: 8px; box-sizing: border-box; font-size: 14px;
    border: 1px solid #ccc; border-radius: 6px; background: #fff;
  }
  button {
    margin-top: 20px; padding: 10px 20px; background: #2d6cdf; color: #fff;
    border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #status { margin-top: 16px; font-size: 13px; color: #555; white-space: pre-wrap; }
  #status.error { color: #c0392b; }
  #status.success { color: #1a7f37; }
  a.nav { font-size: 13px; }
</style>
</head>
<body>

<a class="nav" href="index.html">← 一覧に戻る</a>
<h1>3Dキャプチャ アップロード</h1>

<label for="projectSelect">案件（工程表の登録案件から選択）</label>
<select id="projectSelect"><option>読み込み中...</option></select>

<label for="machineName">機械名</label>
<input type="text" id="machineName" placeholder="例：2814DF">

<label for="partLabel">パーツ番号・撮影箇所（任意）</label>
<input type="text" id="partLabel" placeholder="例：①、正面、上部など">

<label for="fileInput">3Dファイル（.splat / .ply / .ksplat / .spz / .sog）</label>
<input type="file" id="fileInput" accept=".splat,.ply,.ksplat,.spz,.sog">

<button id="uploadBtn">アップロード</button>

<div id="status"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// あなたのSupabaseプロジェクトの値
const SUPABASE_URL = "https://dgekjzkrybrswsxlcbvh.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_zRR5iAFLHHLvtGW5AECNnQ_GLiGemGb";
const BUCKET = "splat-files";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const projectSelect = document.getElementById("projectSelect");
const machineNameInput = document.getElementById("machineName");
const partLabelInput = document.getElementById("partLabel");
const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");
const statusEl = document.getElementById("status");

function setStatus(msg, kind) {
  statusEl.textContent = msg;
  statusEl.className = kind || "";
}

// ファイル名から安全なファイル名を新規生成する（元の名前は使わない）
function buildSafeFileName(machineName, partLabel, originalFileName) {
  const ext = (originalFileName.split(".").pop() || "splat").toLowerCase();
  const base = (machineName || "machine")
    .replace(/[^a-zA-Z0-9]/g, "")
    .slice(0, 30) || "machine";
  const part = (partLabel || "")
    .replace(/[^a-zA-Z0-9]/g, "")
    .slice(0, 20);
  const stamp = Date.now();
  return [base, part, stamp].filter(Boolean).join("_") + "." + ext;
}

// 工程表アプリのtasksテーブルから案件一覧を取得
async function loadProjects() {
  const { data, error } = await supabase
    .from("tasks")
    .select("project_number, customer_name")
    .not("project_number", "is", null);

  if (error) {
    projectSelect.innerHTML = "";
    setStatus("案件一覧の取得に失敗しました：" + error.message, "error");
    return;
  }

  const seen = new Map();
  (data || []).forEach((row) => {
    const num = (row.project_number || "").toString().trim();
    if (!num || seen.has(num)) return;
    seen.set(num, row.customer_name || "");
  });

  projectSelect.innerHTML = "";
  if (seen.size === 0) {
    projectSelect.innerHTML = "<option value=''>案件が見つかりません</option>";
    return;
  }
  [...seen.entries()].forEach(([num, customer]) => {
    const opt = document.createElement("option");
    opt.value = num;
    opt.textContent = customer ? `${num}　${customer}` : num;
    projectSelect.appendChild(opt);
  });
}

// splat_projects に該当案件があれば取得、無ければ作成
async function findOrCreateProject(projectNumber) {
  const { data: existing } = await supabase
    .from("splat_projects")
    .select("id")
    .eq("name", projectNumber)
    .maybeSingle();

  if (existing) return existing.id;

  const { data: created, error } = await supabase
    .from("splat_projects")
    .insert({ name: projectNumber })
    .select("id")
    .single();

  if (error) throw error;
  return created.id;
}

// splat_machines に該当機械があれば取得、無ければ作成
async function findOrCreateMachine(projectId, machineName) {
  const { data: existing } = await supabase
    .from("splat_machines")
    .select("id")
    .eq("project_id", projectId)
    .eq("name", machineName)
    .maybeSingle();

  if (existing) return existing.id;

  const { data: created, error } = await supabase
    .from("splat_machines")
    .insert({ project_id: projectId, name: machineName })
    .select("id")
    .single();

  if (error) throw error;
  return created.id;
}

uploadBtn.addEventListener("click", async () => {
  const projectNumber = projectSelect.value;
  const machineName = machineNameInput.value.trim();
  const partLabel = partLabelInput.value.trim();
  const file = fileInput.files[0];

  if (!projectNumber) return setStatus("案件を選択してください", "error");
  if (!machineName) return setStatus("機械名を入力してください", "error");
  if (!file) return setStatus("ファイルを選択してください", "error");

  uploadBtn.disabled = true;
  try {
    setStatus("アップロード中...");
    const safeName = buildSafeFileName(machineName, partLabel, file.name);

    const { error: uploadError } = await supabase.storage
      .from(BUCKET)
      .upload(safeName, file, { cacheControl: "3600", upsert: false });
    if (uploadError) throw uploadError;

    const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(safeName);
    const fileUrl = urlData.publicUrl;

    setStatus("案件情報を登録中...");
    const projectId = await findOrCreateProject(projectNumber);

    setStatus("機械情報を登録中...");
    const machineId = await findOrCreateMachine(projectId, machineName);

    setStatus("ファイル情報を登録中...");
    const { error: insertError } = await supabase
      .from("splat_files")
      .insert({
        machine_id: machineId,
        part_label: partLabel || null,
        file_url: fileUrl,
      });
    if (insertError) throw insertError;

    setStatus("アップロード完了しました！一覧画面で確認できます。", "success");
    partLabelInput.value = "";
    fileInput.value = "";
  } catch (err) {
    console.error(err);
    setStatus("エラーが発生しました：" + (err.message || err), "error");
  } finally {
    uploadBtn.disabled = false;
  }
});

loadProjects();
</script>
</body>
</html>

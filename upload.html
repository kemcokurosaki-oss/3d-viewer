<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Model Capture</title>
<style>
  body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 24px; max-width: 480px; }
  h1 { font-size: 20px; }
  label { display: block; font-size: 13px; color: #555; margin-top: 16px; margin-bottom: 4px; }
  select, input[type="text"], input[type="file"] {
    width: 100%; padding: 8px; box-sizing: border-box; font-size: 14px;
    border: 1px solid #ccc; border-radius: 6px; background: #fff;
  }
  button {
    margin-top: 20px; padding: 10px 20px; background: #2d6cdf; color: #fff;
    border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .thumb-candidates-wrap { display: none; margin-top: 12px; }
  .thumb-candidates-wrap.visible { display: block; }
  .thumb-candidates-label { font-size: 12px; color: #777; margin-bottom: 6px; }
  .thumb-candidates { display: flex; flex-wrap: wrap; gap: 8px; }
  .thumb-candidates img {
    width: 76px; height: 57px; object-fit: cover; border-radius: 6px; cursor: pointer;
    border: 2px solid transparent; box-sizing: border-box;
  }
  .thumb-candidates img.selected { border-color: #2d6cdf; }
  #status { margin-top: 16px; font-size: 13px; color: #555; white-space: pre-wrap; }
  #status.error { color: #c0392b; }
  #status.success { color: #1a7f37; }
  a.nav { font-size: 13px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
  }
}
</script>
</head>
<body>

<a class="nav" href="index.html">← 一覧に戻る</a>
<h1>3Dキャプチャ アップロード</h1>

<label for="projectSelect">案件（工程表の登録案件から選択）</label>
<select id="projectSelect"><option>読み込み中...</option></select>

<label for="machineName">機械名</label>
<input type="text" id="machineName" placeholder="例：2814DF">

<label for="partLabel">【パーツ番号・撮影箇所】（任意・複数ファイル選択時は無視されファイル名が使われます）</label>
<input type="text" id="partLabel" placeholder="例：①、正面、上部など">

<label for="fileInput">【3Dファイル】（.splat / .ply / .ksplat / .spz / .sog・複数選択可）</label>
<input type="file" id="fileInput" accept=".splat,.ply,.ksplat,.spz,.sog" multiple>

<label for="thumbnailInput">【サムネイル画像】（任意・未指定なら自動撮影／複数ファイル選択時は無視されます）</label>
<input type="file" id="thumbnailInput" accept="image/*">

<div id="thumbnailCandidatesWrap" class="thumb-candidates-wrap">
  <div class="thumb-candidates-label">自動撮影した候補から選ぶ（クリックでサムネイルに使う画像を選択・未選択なら1枚目を使用）</div>
  <div id="thumbnailCandidates" class="thumb-candidates"></div>
</div>

<button id="uploadBtn">アップロード</button>

<div id="status"></div>

<script type="module">
import { fetchProjectOptions, uploadPart, captureThumbnailCandidates, splatFileTypeFromFileName } from "./upload-core.js";

const projectSelect = document.getElementById("projectSelect");
const machineNameInput = document.getElementById("machineName");
const partLabelInput = document.getElementById("partLabel");
const fileInput = document.getElementById("fileInput");
const thumbnailInput = document.getElementById("thumbnailInput");
const thumbnailCandidatesWrapEl = document.getElementById("thumbnailCandidatesWrap");
const thumbnailCandidatesEl = document.getElementById("thumbnailCandidates");
const uploadBtn = document.getElementById("uploadBtn");
const statusEl = document.getElementById("status");

function setStatus(msg, kind) {
  statusEl.textContent = msg;
  statusEl.className = kind || "";
}

// ---- サムネイル候補（単体アップロード時のみ、4アングルを自動撮影して選ばせる） ----
let candidateBlobs = [];
let candidateObjectUrls = [];
let selectedCandidateIndex = -1;
let candidateSourceUrl = null;

function clearThumbnailCandidates() {
  candidateObjectUrls.forEach((url) => URL.revokeObjectURL(url));
  if (candidateSourceUrl) URL.revokeObjectURL(candidateSourceUrl);
  candidateBlobs = [];
  candidateObjectUrls = [];
  selectedCandidateIndex = -1;
  candidateSourceUrl = null;
  thumbnailCandidatesEl.innerHTML = "";
  thumbnailCandidatesWrapEl.classList.remove("visible");
}

function renderThumbnailCandidates() {
  thumbnailCandidatesEl.innerHTML = "";
  candidateObjectUrls.forEach((url, i) => {
    const img = document.createElement("img");
    img.src = url;
    img.className = i === selectedCandidateIndex ? "selected" : "";
    img.title = "クリックでこの画像をサムネイルに選択";
    img.addEventListener("click", () => {
      selectedCandidateIndex = i;
      renderThumbnailCandidates();
    });
    thumbnailCandidatesEl.appendChild(img);
  });
  thumbnailCandidatesEl.classList.add("visible");
}

async function generateThumbnailCandidates(file) {
  clearThumbnailCandidates();
  candidateSourceUrl = URL.createObjectURL(file);
  setStatus("サムネイル候補を生成中...");
  try {
    const blobs = await captureThumbnailCandidates(candidateSourceUrl, splatFileTypeFromFileName(file.name));
    candidateBlobs = blobs;
    candidateObjectUrls = blobs.map((b) => URL.createObjectURL(b));
    selectedCandidateIndex = 0;
    renderThumbnailCandidates();
    setStatus("");
  } catch (err) {
    console.error(err);
    clearThumbnailCandidates();
    setStatus("サムネイル候補の生成に失敗しました（アップロード時は自動生成にフォールバックします）", "error");
  }
}

fileInput.addEventListener("change", () => {
  const files = [...fileInput.files];
  if (files.length === 1) {
    generateThumbnailCandidates(files[0]);
  } else {
    clearThumbnailCandidates();
  }
});

async function loadProjects() {
  try {
    const options = await fetchProjectOptions();
    projectSelect.innerHTML = "";
    if (options.length === 0) {
      projectSelect.innerHTML = "<option value=''>案件が見つかりません</option>";
      return;
    }
    options.forEach(({ num, customer }) => {
      const opt = document.createElement("option");
      opt.value = num;
      opt.textContent = customer ? `${num}　${customer}` : num;
      projectSelect.appendChild(opt);
    });
  } catch (err) {
    projectSelect.innerHTML = "";
    setStatus("案件一覧の取得に失敗しました：" + err.message, "error");
  }
}

// 拡張子を除いたファイル名をパーツラベルとして使う
function labelFromFileName(fileName) {
  return fileName.replace(/\.[^.]+$/, "");
}

uploadBtn.addEventListener("click", async () => {
  const projectNumber = projectSelect.value;
  const machineName = machineNameInput.value.trim();
  const partLabel = partLabelInput.value.trim();
  const files = [...fileInput.files];
  const thumbnailFile = thumbnailInput.files[0];

  if (!projectNumber) return setStatus("案件を選択してください", "error");
  if (!machineName) return setStatus("機械名を入力してください", "error");
  if (files.length === 0) return setStatus("ファイルを選択してください", "error");

  const isBatch = files.length > 1;
  const thumbnailBlob = !isBatch && selectedCandidateIndex >= 0 ? candidateBlobs[selectedCandidateIndex] : null;

  uploadBtn.disabled = true;
  const failed = [];
  try {
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const label = isBatch ? labelFromFileName(file.name) : partLabel;
      try {
        await uploadPart(
          {
            projectNumber,
            machineName,
            partLabel: label,
            file,
            thumbnailFile: isBatch ? null : thumbnailFile,
            thumbnailBlob: isBatch ? null : thumbnailBlob,
          },
          (msg) => setStatus(`[${i + 1}/${files.length}] ${file.name}：${msg}`)
        );
      } catch (err) {
        console.error(err);
        failed.push({ name: file.name, message: err.message || String(err) });
      }
    }

    if (failed.length === 0) {
      setStatus(`アップロード完了しました！（${files.length}件）一覧画面で確認できます。`, "success");
    } else {
      const failedList = failed.map((f) => `${f.name}：${f.message}`).join("\n");
      setStatus(
        `${files.length - failed.length}/${files.length}件アップロードしました。失敗：\n${failedList}`,
        "error"
      );
    }
    partLabelInput.value = "";
    fileInput.value = "";
    thumbnailInput.value = "";
    clearThumbnailCandidates();
  } finally {
    uploadBtn.disabled = false;
  }
});

loadProjects();
</script>
</body>
</html>

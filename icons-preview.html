<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アイコン一覧プレビュー</title>
<style>
  body { font-family: sans-serif; background: #f4f6f8; padding: 24px; }
  h1 { font-size: 18px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
  }
  .card {
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .card .icon { width: 28px; height: 28px; stroke: #2c3e50; }
  .card .name { font-size: 12px; color: #444; text-align: center; word-break: break-all; }
  .card .emoji { font-size: 28px; line-height: 1; }
  h2 { font-size: 15px; margin: 32px 0 8px; }
</style>
</head>
<body>
<h1>icons.js アイコン一覧（このファイルはicons.jsの内容を直接埋め込んだプレビュー専用コピーです）</h1>
<p style="font-size:13px;color:#666;">末尾の ICON_GEAR_STRAIGHT8 / ICON_GEAR_6TOOTH / ICON_TUNE_SLIDERS は比較用に追加した候補で、まだicons.js/アプリ本体には未反映です。</p>
<div class="grid" id="grid"></div>

<h2>カラー絵文字候補（設定・歯車系／SVGではなくUnicode文字そのもの）</h2>
<p style="font-size:13px;color:#666;">OS・フォントによって見え方が変わります。表示はこのPCの環境依存です。</p>
<div class="grid" id="emojiGrid"></div>
<script>
function icon(paths, viewBox = "0 0 24 24") {
  return `<svg class="icon" viewBox="${viewBox}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths}</svg>`;
}

const icons = {
  ICON_CUBE: icon('<path d="M12 3 21 8v8l-9 5-9-5V8z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v8"/>'),
  ICON_SEARCH: icon('<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>'),
  ICON_EDIT: icon('<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>'),
  ICON_PLUS: icon('<path d="M12 5v14"/><path d="M5 12h14"/>'),
  ICON_EXPAND: icon('<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>'),
  ICON_CLOSE: icon('<path d="M18 6 6 18"/><path d="M6 6l12 12"/>'),
  ICON_RESET: icon('<path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/>'),
  ICON_HAND: icon('<path d="M8 13V6a2 2 0 0 1 4 0v6"/><path d="M12 6a2 2 0 0 1 4 0v6"/><path d="M16 8a2 2 0 0 1 4 0v6a7 7 0 0 1-7 7h-1a7 7 0 0 1-6-3.5L3.5 13a1.7 1.7 0 0 1 2.8-1.9L8 13"/>'),
  ICON_CLOCK: icon('<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>'),
  ICON_SUN: icon('<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="m17.7 17.7 1.4 1.4"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m4.9 19.1 1.4-1.4"/><path d="m17.7 6.3 1.4-1.4"/>'),
  ICON_MOON: icon('<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>'),
  ICON_GEAR: icon('<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/>'),
  ICON_GEAR_STRAIGHT8: icon('<circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.8"/><g stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.9" y1="4.9" x2="7" y2="7"/><line x1="17" y1="17" x2="19.1" y2="19.1"/><line x1="4.9" y1="19.1" x2="7" y2="17"/><line x1="17" y1="7" x2="19.1" y2="4.9"/></g>'),
  ICON_GEAR_6TOOTH: icon('<g transform="translate(12,12)"><circle r="5"/><circle r="1.8"/><g stroke-linecap="round"><line x1="0" y1="-7" x2="0" y2="-9"/><line x1="0" y1="-7" x2="0" y2="-9" transform="rotate(60)"/><line x1="0" y1="-7" x2="0" y2="-9" transform="rotate(120)"/><line x1="0" y1="-7" x2="0" y2="-9" transform="rotate(180)"/><line x1="0" y1="-7" x2="0" y2="-9" transform="rotate(240)"/><line x1="0" y1="-7" x2="0" y2="-9" transform="rotate(300)"/></g></g>'),
  ICON_TUNE_SLIDERS: icon('<line x1="4" y1="6" x2="20" y2="6"/><circle cx="9" cy="6" r="2"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="7" cy="18" r="2"/>'),
};

const grid = document.getElementById("grid");
for (const [name, svg] of Object.entries(icons)) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `${svg}<div class="name">${name}</div>`;
  grid.appendChild(card);
}

const emojis = {
  "⚙️": "歯車",
  "🔧": "レンチ",
  "🛠️": "工具",
  "🔩": "ボルト",
  "🎛️": "つまみ",
};
const emojiGrid = document.getElementById("emojiGrid");
for (const [char, label] of Object.entries(emojis)) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<div class="emoji">${char}</div><div class="name">${char} ${label}</div>`;
  emojiGrid.appendChild(card);
}
</script>
</body>
</html>

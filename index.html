<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3Dモデルキャプチャ</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "メイリオ", Meiryo, sans-serif; font-size: 13px; color: #263238;
    background: #eef1f3; margin: 0;
  }

  .app-header {
    background: linear-gradient(180deg, #34495e, #2c3e50); color: #fff;
    padding: 10px 16px; box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }
  .app-header h1 { margin: 0; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

  .layout { display: flex; align-items: stretch; min-height: calc(100vh - 41px); }

  /* 左：工事番号一覧（工事番号の下に機械名をネストして表示） */
  .sidebar { width: 280px; flex-shrink: 0; background: #fff; border-right: 1px solid #dfe3e6; overflow-y: auto; }
  #sidebarStatus { padding: 10px 16px; color: #78909c; font-size: 12px; }
  .sidebar-project { border-bottom: 2px solid #cfd8dc; }
  .sidebar-item { padding: 12px 16px; cursor: pointer; font-size: 16px; }
  .sidebar-item:hover { background: #eef1f3; }
  .sidebar-item.active { background: #e3f2fd; color: #0d47a1; box-shadow: inset 4px 0 0 #1565c0; }
  .sidebar-item-num { font-weight: 700; }
  .sidebar-item .sidebar-item-customer { display: block; font-size: 14px; font-weight: 400; color: #78909c; margin-top: 2px; }
  .sidebar-item.active .sidebar-item-customer { color: #1565c0; }

  .sidebar-machines { background: #f7f9fa; padding: 4px 0; }
  .sidebar-machine-btn {
    display: block; width: 100%; text-align: left; padding: 8px 16px 8px 32px;
    border: none; background: none; cursor: pointer; font-size: 14px; color: #263238;
  }
  .sidebar-machine-btn:hover { background: #eef1f3; }
  .sidebar-machine-btn.active { background: #e3f2fd; color: #0d47a1; box-shadow: inset 4px 0 0 #1565c0; }
  .sidebar-machine-empty { padding: 8px 16px 8px 32px; color: #78909c; font-size: 13px; }

  /* 右：メインエリア */
  .main { flex: 1; padding: 24px; min-width: 0; }
  .main-placeholder { color: #78909c; font-size: 13px; }
  .breadcrumb { font-size: 13px; color: #78909c; margin-bottom: 14px; }

  .parts-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

  .parts { display: flex; gap: 24px; flex-wrap: wrap; }
  .part-card { position: relative; width: 400px; display: flex; flex-direction: column;
    align-items: center; gap: 8px; font-size: 16px; }
  .part-thumb-btn { padding: 8px; background: #fff; border: 1px solid #dfe3e6;
    border-radius: 8px; cursor: pointer; width: 100%; }
  .part-thumb-btn:hover { border-color: #1565c0; }
  .part-thumb, .part-thumb-placeholder {
    width: 100%; height: 300px; border-radius: 4px; object-fit: cover; display: block;
  }
  .part-thumb-placeholder {
    background: #1565c0; color: #fff; display: flex; align-items: center;
    justify-content: center; font-size: 32px;
  }
  .part-edit-btn {
    position: absolute; top: 4px; right: 4px; width: 32px; height: 32px;
    background: rgba(0,0,0,0.55); color: #fff; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 16px; cursor: pointer;
    line-height: 1;
  }
  .part-edit-btn:hover { background: rgba(0,0,0,0.8); }
  .part-edit-btn input { display: none; }

  button.primary {
    padding: 8px 16px; background: #1565c0; color: #fff; border: none;
    border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  button.primary:hover { background: #0d47a1; }

  /* インラインプレビュー */
  #previewPanel {
    display: none; margin-top: 24px; background: #1a1a1a; border-radius: 8px;
    overflow: hidden;
  }
  #previewHeader {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: #262626; color: #fff; font-size: 13px;
  }
  #previewHeader .actions button {
    margin-left: 8px; padding: 6px 12px; border: none; border-radius: 6px;
    cursor: pointer; font-size: 13px;
  }
  #fullscreenBtn { background: #1565c0; color: #fff; }
  #fullscreenBtn:hover { background: #0d47a1; }
  #closePreviewBtn { background: #444; color: #fff; }
  #closePreviewBtn:hover { background: #333; }
  #previewViewer { position: relative; width: 100%; height: 480px; }
  #previewStatus {
    position: absolute; top: 10px; left: 10px; color: #fff;
    background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 6px; font-size: 12px;
  }

  /* アップロードモーダル */
  #uploadOverlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    align-items: center; justify-content: center; z-index: 100;
  }
  #uploadModal {
    background: #fff; border-radius: 8px; padding: 24px; width: 100%; max-width: 420px;
  }
  #uploadModal h2 { font-size: 18px; margin: 0 0 4px; }
  #uploadContext { margin: 0; color: #78909c; }
  #uploadModal label { display: block; font-size: 13px; color: #555; margin-top: 16px; margin-bottom: 4px; }
  #uploadModal input[type="text"], #uploadModal input[type="file"] {
    width: 100%; padding: 8px; box-sizing: border-box; font-size: 14px;
    border: 1px solid #ccc; border-radius: 6px; background: #fff;
  }
  #uploadModal .modal-actions { margin-top: 20px; display: flex; gap: 8px; }
  #uploadModal button.secondary {
    padding: 10px 20px; background: #eee; color: #333; border: none;
    border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  #uploadModal button:disabled { background: #aaa; cursor: not-allowed; }
  #uploadStatus { margin-top: 16px; font-size: 13px; color: #555; white-space: pre-wrap; }
  #uploadStatus.error { color: #c0392b; }
  #uploadStatus.success { color: #1a7f37; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
  }
}
</script>
</head>
<body>

<header class="app-header">
  <h1>⚙️ 3Dモデルキャプチャ</h1>
</header>

<div class="layout">
  <aside class="sidebar">
    <div id="sidebarStatus">読み込み中...</div>
    <div id="sidebarList"></div>
  </aside>

  <main class="main">
    <div id="mainContent"></div>

    <div id="previewPanel">
      <div id="previewHeader">
        <span id="previewTitle"></span>
        <div class="actions">
          <button id="fullscreenBtn">全画面表示</button>
          <button id="closePreviewBtn">閉じる</button>
        </div>
      </div>
      <div id="previewViewer">
        <div id="previewStatus"></div>
      </div>
    </div>
  </main>
</div>

<div id="uploadOverlay">
  <div id="uploadModal">
    <h2>3Dキャプチャ アップロード</h2>
    <p id="uploadContext"></p>

    <label for="partLabel">パーツ番号・撮影箇所（任意）</label>
    <input type="text" id="partLabel" placeholder="例：①、正面、上部など">

    <label for="fileInput">3Dファイル（.splat / .ply / .ksplat / .spz / .sog）</label>
    <input type="file" id="fileInput" accept=".splat,.ply,.ksplat,.spz,.sog">

    <label for="thumbnailInput">サムネイル画像（任意・未指定なら自動撮影）</label>
    <input type="file" id="thumbnailInput" accept="image/*">

    <div class="modal-actions">
      <button class="primary" id="uploadBtn">アップロード</button>
      <button class="secondary" id="cancelUploadBtn">キャンセル</button>
    </div>

    <div id="uploadStatus"></div>
  </div>
</div>

<script type="module">
import { initViewer } from "./viewer-core.js";
import { fetchProjectMachineTree, fetchMachineFiles, uploadPart, updateThumbnail } from "./upload-core.js";

const sidebarStatus = document.getElementById("sidebarStatus");
const sidebarList = document.getElementById("sidebarList");
const mainContent = document.getElementById("mainContent");

const previewPanel = document.getElementById("previewPanel");
const previewTitle = document.getElementById("previewTitle");
const previewViewer = document.getElementById("previewViewer");
const previewStatus = document.getElementById("previewStatus");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const closePreviewBtn = document.getElementById("closePreviewBtn");

const uploadOverlay = document.getElementById("uploadOverlay");
const uploadContext = document.getElementById("uploadContext");
const cancelUploadBtn = document.getElementById("cancelUploadBtn");
const partLabelInput = document.getElementById("partLabel");
const fileInput = document.getElementById("fileInput");
const thumbnailInput = document.getElementById("thumbnailInput");
const uploadBtn = document.getElementById("uploadBtn");
const uploadStatusEl = document.getElementById("uploadStatus");

let tree = [];
let currentProject = null;   // { num, customer, machines }
let currentMachine = null;   // 機械名の文字列
let currentViewer = null;
let currentUrl = null;

// ---- 左：工事番号一覧（工程表の全件から作成） ----
async function loadTree() {
  sidebarStatus.textContent = "読み込み中...";
  try {
    const allProjects = await fetchProjectMachineTree();
    // 工事番号2000番台のみ表示（一時的な絞り込み）
    tree = allProjects.filter((project) => {
      const n = parseInt(project.num, 10);
      return !isNaN(n) && n >= 2000 && n <= 2999;
    });
    sidebarStatus.textContent = "";
    renderSidebar();
    renderMain();
  } catch (err) {
    sidebarStatus.textContent = "読み込みエラー：" + err.message;
  }
}

function renderSidebar() {
  sidebarList.innerHTML = "";
  tree.forEach((project) => {
    const projectDiv = document.createElement("div");
    projectDiv.className = "sidebar-project";

    const item = document.createElement("div");
    item.className = "sidebar-item" + (currentProject?.num === project.num ? " active" : "");

    const num = document.createElement("span");
    num.className = "sidebar-item-num";
    num.textContent = project.num;
    item.appendChild(num);

    if (project.customer) {
      const customer = document.createElement("span");
      customer.className = "sidebar-item-customer";
      customer.textContent = project.customer;
      item.appendChild(customer);
    }

    item.onclick = () => toggleProject(project);
    projectDiv.appendChild(item);

    if (currentProject?.num === project.num) {
      const machinesDiv = document.createElement("div");
      machinesDiv.className = "sidebar-machines";
      if (project.machines.length === 0) {
        const empty = document.createElement("div");
        empty.className = "sidebar-machine-empty";
        empty.textContent = "機械名の登録がありません";
        machinesDiv.appendChild(empty);
      } else {
        project.machines.forEach((machineName) => {
          const btn = document.createElement("button");
          btn.className = "sidebar-machine-btn" + (currentMachine === machineName ? " active" : "");
          btn.textContent = machineName;
          btn.onclick = () => selectMachine(machineName);
          machinesDiv.appendChild(btn);
        });
      }
      projectDiv.appendChild(machinesDiv);
    }

    sidebarList.appendChild(projectDiv);
  });
}

function toggleProject(project) {
  currentProject = currentProject?.num === project.num ? null : project;
  currentMachine = null;
  closePreview();
  renderSidebar();
  renderMain();
}

function selectMachine(machineName) {
  currentMachine = machineName;
  closePreview();
  renderSidebar();
  renderMain();
}

// ---- 右：メインエリア（機械名を選ぶとサムネイル一覧を表示） ----
function renderMain() {
  mainContent.innerHTML = "";

  if (!currentMachine) {
    const placeholder = document.createElement("div");
    placeholder.className = "main-placeholder";
    placeholder.textContent = "左の一覧から工事番号→機械名を選択してください";
    mainContent.appendChild(placeholder);
    return;
  }

  const breadcrumb = document.createElement("div");
  breadcrumb.className = "breadcrumb";
  const projectLabel = currentProject.customer
    ? `${currentProject.num}　${currentProject.customer}`
    : currentProject.num;
  breadcrumb.textContent = `${projectLabel} ＞ ${currentMachine}`;
  mainContent.appendChild(breadcrumb);

  renderPartsView();
}

function renderPartsView() {
  const header = document.createElement("div");
  header.className = "parts-header";

  const status = document.createElement("span");
  status.className = "main-placeholder";
  status.id = "partsStatus";
  status.textContent = "読み込み中...";
  header.appendChild(status);

  const uploadBtnEl = document.createElement("button");
  uploadBtnEl.className = "primary";
  uploadBtnEl.textContent = "＋ アップロード";
  uploadBtnEl.onclick = openUploadModal;
  header.appendChild(uploadBtnEl);

  mainContent.appendChild(header);

  const partsDiv = document.createElement("div");
  partsDiv.className = "parts";
  partsDiv.id = "partsContainer";
  mainContent.appendChild(partsDiv);

  loadMachineFiles();
}

async function loadMachineFiles() {
  const statusEl = document.getElementById("partsStatus");
  const partsDiv = document.getElementById("partsContainer");
  if (!statusEl || !partsDiv) return;

  try {
    const files = await fetchMachineFiles(currentProject.num, currentMachine);
    statusEl.textContent = files.length === 0
      ? "アップロード済みの3Dモデルはまだありません"
      : `ファイル ${files.length}件`;
    partsDiv.innerHTML = "";
    files.forEach((file) => partsDiv.appendChild(buildPartCard(file)));
  } catch (err) {
    statusEl.textContent = "読み込みエラー：" + err.message;
  }
}

function buildPartCard(file) {
  const card = document.createElement("div");
  card.className = "part-card";

  const thumbBtn = document.createElement("button");
  thumbBtn.className = "part-thumb-btn";
  if (file.thumbnail_url) {
    const img = document.createElement("img");
    img.className = "part-thumb";
    img.src = file.thumbnail_url;
    img.alt = "";
    thumbBtn.appendChild(img);
  } else {
    const placeholder = document.createElement("span");
    placeholder.className = "part-thumb-placeholder";
    placeholder.textContent = "3D";
    thumbBtn.appendChild(placeholder);
  }
  thumbBtn.onclick = () => openPreview(file.file_url, `${currentMachine}　${file.part_label || ""}`);
  card.appendChild(thumbBtn);

  const editLabel = document.createElement("label");
  editLabel.className = "part-edit-btn";
  editLabel.title = "サムネイルを変更";
  editLabel.textContent = "✎";
  const editInput = document.createElement("input");
  editInput.type = "file";
  editInput.accept = "image/*";
  editInput.onchange = async () => {
    const chosen = editInput.files[0];
    if (!chosen) return;
    editLabel.textContent = "…";
    try {
      await updateThumbnail(file.id, chosen);
      await loadMachineFiles();
    } catch (err) {
      console.error(err);
      const statusEl = document.getElementById("partsStatus");
      if (statusEl) statusEl.textContent = "サムネイルの更新に失敗しました：" + (err.message || err);
      editLabel.textContent = "✎";
    }
  };
  editLabel.appendChild(editInput);
  card.appendChild(editLabel);

  const label = document.createElement("span");
  label.textContent = file.part_label || "表示";
  card.appendChild(label);

  return card;
}

// ---- インラインプレビュー ----
function openPreview(url, title) {
  currentViewer?.dispose();
  previewViewer.querySelectorAll("canvas").forEach(c => c.remove());

  currentUrl = url;
  previewTitle.textContent = title;
  previewPanel.style.display = "block";
  previewPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });

  currentViewer = initViewer(previewViewer, url, {
    onStatus: (msg) => { previewStatus.textContent = msg; },
  });
}

function closePreview() {
  currentViewer?.dispose();
  currentViewer = null;
  currentUrl = null;
  previewPanel.style.display = "none";
}

fullscreenBtn.onclick = () => {
  if (!currentUrl) return;
  window.open("viewer.html?url=" + encodeURIComponent(currentUrl), "_blank");
};
closePreviewBtn.onclick = closePreview;

// ---- アップロードモーダル（選択中の工事番号・機械名に対してアップロードする） ----
function setUploadStatus(msg, kind) {
  uploadStatusEl.textContent = msg;
  uploadStatusEl.className = kind || "";
}

function openUploadModal() {
  uploadOverlay.style.display = "flex";
  setUploadStatus("");
  uploadContext.textContent = `案件：${currentProject.num}　機械名：${currentMachine}`;
}

function closeUploadModal() {
  uploadOverlay.style.display = "none";
}

cancelUploadBtn.onclick = closeUploadModal;

uploadBtn.addEventListener("click", async () => {
  const partLabel = partLabelInput.value.trim();
  const file = fileInput.files[0];
  const thumbnailFile = thumbnailInput.files[0];

  if (!file) return setUploadStatus("ファイルを選択してください", "error");

  uploadBtn.disabled = true;
  try {
    await uploadPart({
      projectNumber: currentProject.num,
      machineName: currentMachine,
      partLabel,
      file,
      thumbnailFile,
    }, (msg) => setUploadStatus(msg));
    setUploadStatus("アップロード完了しました！", "success");
    partLabelInput.value = "";
    fileInput.value = "";
    thumbnailInput.value = "";
    await loadMachineFiles();
  } catch (err) {
    console.error(err);
    setUploadStatus("エラーが発生しました：" + (err.message || err), "error");
  } finally {
    uploadBtn.disabled = false;
  }
});

loadTree();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Model Capture</title>
<style>
  :root {
    --color-bg: #eef1f3;
    --color-surface: #fff;
    --color-surface-alt: #f7f9fa;
    --color-border: #dfe3e6;
    --color-border-strong: #cfd8dc;
    --color-text: #263238;
    --color-text-muted: #78909c;
    --color-accent: #1565c0;
    --color-accent-dark: #0d47a1;
    --color-accent-soft: #e3f2fd;
    --color-header-start: #34495e;
    --color-header-end: #2c3e50;
    --color-danger: #c0392b;
    --color-success: #1a7f37;
    --color-viewer-bg: #1a1a1a;
    --color-viewer-panel: #262626;

    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;

    --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 2px 6px rgba(0,0,0,.12);
    --shadow-lg: 0 6px 16px rgba(0,0,0,.16);

    --transition-fast: .15s ease;
  }

  html[data-theme="dark"] {
    --color-bg: #14181b;
    --color-surface: #1e2429;
    --color-surface-alt: #262d33;
    --color-border: #333c42;
    --color-border-strong: #3d474e;
    --color-text: #dce3e8;
    --color-text-muted: #8ea0ab;
    --color-accent: #4d9de8;
    --color-accent-dark: #7fbcf2;
    --color-accent-soft: #1f3a52;
    --color-header-start: #1c2226;
    --color-header-end: #12171a;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Yu Gothic UI", "メイリオ", Meiryo, sans-serif; font-size: 13px; color: var(--color-text);
    background: var(--color-bg); margin: 0;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    transition: background var(--transition-fast), color var(--transition-fast);
  }

  .app-header {
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--color-header-start), var(--color-header-end)); color: #fff;
    padding: 10px 16px; box-shadow: var(--shadow-md);
    display: flex; align-items: center; justify-content: space-between;
  }
  .app-header h1 { margin: 0; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 0; }
  .app-header #headerIcon { font-size: 18px; line-height: 1; display: flex; align-items: center; margin-right: 8px; }
  .app-header #headerIcon .icon { width: 20px; height: 20px; }

  .theme-toggle-btn {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
    background: rgba(255,255,255,.12); color: #fff; transition: background var(--transition-fast);
  }
  .theme-toggle-btn:hover { background: rgba(255,255,255,.22); }
  .theme-toggle-btn .icon { width: 18px; height: 18px; }

  .layout { display: flex; align-items: stretch; flex: 1; min-height: 0; }

  /* 左：工事番号一覧（工事番号の下に機械名をネストして表示） */
  .sidebar { width: 200px; flex-shrink: 0; background: var(--color-surface); border-right: 1px solid var(--color-border); overflow-y: auto; }
  html[data-theme="dark"] .sidebar { scrollbar-color: var(--color-border-strong) transparent; }
  html[data-theme="dark"] .sidebar::-webkit-scrollbar { width: 10px; }
  html[data-theme="dark"] .sidebar::-webkit-scrollbar-track { background: transparent; }
  html[data-theme="dark"] .sidebar::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: var(--radius-sm); }
  html[data-theme="dark"] .sidebar::-webkit-scrollbar-thumb:hover { background: var(--color-text-muted); }
  #sidebarStatus, .sidebar-empty-msg { padding: 10px 16px; color: var(--color-text-muted); font-size: 12px; }

  .sidebar-fixed { position: sticky; top: 0; z-index: 1; background: var(--color-surface); }
  .sidebar-search { padding: 10px 12px; border-bottom: 1px solid var(--color-border); background: var(--color-surface); }
  .sidebar-search-box { position: relative; display: flex; align-items: center; }
  .sidebar-search-box .icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--color-text-muted); pointer-events: none; }
  #sidebarSearch {
    width: 100%; padding: 7px 8px 7px 28px; font-size: 13px; color: var(--color-text);
    border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg);
    transition: border-color var(--transition-fast);
  }
  #sidebarSearch:focus { outline: none; border-color: var(--color-accent); }

  .sidebar-project { border-bottom: 2px solid var(--color-border-strong); }
  .sidebar-item {
    display: flex; align-items: flex-start; gap: 8px; padding: 12px 16px 12px 10px;
    cursor: pointer; font-size: 16px; transition: background var(--transition-fast), box-shadow var(--transition-fast);
  }
  .sidebar-item:hover { background: var(--color-bg); }
  /* 階層が開いている状態：中立色（アクセント色は使わず「開いた」ことだけを示す） */
  .sidebar-item.expanded { background: var(--color-surface-alt); box-shadow: inset 3px 0 0 var(--color-border-strong); }
  /* 実際にこの工事番号配下の機械が選択されている状態：強いアクセント色で「今ここを見ている」ことを示す */
  .sidebar-item.expanded.has-selection { background: var(--color-accent-soft); color: var(--color-accent-dark); box-shadow: inset 4px 0 0 var(--color-accent); }
  .sidebar-item.expanded.has-selection .sidebar-item-customer { color: var(--color-accent-dark); }
  .sidebar-item-chevron { flex-shrink: 0; width: 12px; height: 12px; margin-top: 5px; color: var(--color-text-muted); transition: transform var(--transition-fast); }
  .sidebar-item-chevron .icon { width: 100%; height: 100%; }
  .sidebar-item.expanded .sidebar-item-chevron { transform: rotate(90deg); }
  .sidebar-item.expanded.has-selection .sidebar-item-chevron { color: var(--color-accent-dark); }
  .sidebar-item-text { flex: 1; min-width: 0; }
  .sidebar-item-num { font-weight: 700; }
  .sidebar-item .sidebar-item-customer { display: block; font-size: 14px; font-weight: 400; color: var(--color-text-muted); margin-top: 2px; }

  .sidebar-machines { background: var(--color-surface-alt); padding: 4px 0; }
  .sidebar-machine-btn {
    display: block; width: 100%; text-align: left; padding: 8px 16px 8px 34px;
    border: none; background: none; cursor: pointer; font-size: 14px; color: var(--color-text);
    transition: background var(--transition-fast);
  }
  .sidebar-machine-btn:hover { background: var(--color-bg); }
  /* 選択中の機械名：工事番号側より一段強く（太字＋濃いライン）して「最終的にどこを見ているか」を明確にする */
  .sidebar-machine-btn.active { background: var(--color-accent-soft); color: var(--color-accent-dark); font-weight: 700; box-shadow: inset 4px 0 0 var(--color-accent); }
  .sidebar-machine-empty { padding: 8px 16px 8px 34px; color: var(--color-text-muted); font-size: 13px; }

  /* 右：メインエリア */
  .main { flex: 1; padding: 12px 24px 24px; min-width: 0; min-height: 0; display: flex; flex-direction: column; }
  .main-placeholder { color: var(--color-text-muted); font-size: 13px; }

  #mainContent { flex: 1; min-height: 0; display: flex; flex-direction: column; }

  /* サムネイル列とプレビュー列の横並び */
  .content-columns { flex: 1; min-height: 0; display: flex; gap: 24px; align-items: stretch; }

  .thumb-column { width: 260px; flex-shrink: 0; min-height: 0; display: flex; flex-direction: column; gap: 16px; }
  .thumb-list { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding-right: 10px; }
  html[data-theme="dark"] .thumb-list { scrollbar-color: var(--color-border-strong) transparent; }
  html[data-theme="dark"] .thumb-list::-webkit-scrollbar { width: 10px; }
  html[data-theme="dark"] .thumb-list::-webkit-scrollbar-track { background: transparent; }
  html[data-theme="dark"] .thumb-list::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: var(--radius-sm); }
  html[data-theme="dark"] .thumb-list::-webkit-scrollbar-thumb:hover { background: var(--color-text-muted); }
  .part-card { position: relative; width: 100%; display: flex; flex-direction: column;
    align-items: center; gap: 6px; font-size: 14px; cursor: grab; }
  .part-card.dragging { opacity: 0.4; }
  .drop-indicator {
    height: 0; width: 100%; border-top: 2px dashed var(--color-accent);
    pointer-events: none;
  }
  .part-thumb-btn { padding: 8px; background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: var(--radius-lg); cursor: pointer; width: 100%; box-shadow: var(--shadow-sm);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast); }
  .part-thumb-btn:hover { border-color: var(--color-accent); box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .part-thumb, .part-thumb-placeholder {
    width: 100%; aspect-ratio: 4 / 3; border-radius: var(--radius-sm); object-fit: cover; display: block;
  }
  .part-thumb-placeholder {
    background: var(--color-accent); color: #fff; display: flex; align-items: center;
    justify-content: center; font-size: 24px;
  }
  .part-thumb-placeholder .icon { width: 28px; height: 28px; }
  .part-edit-btn {
    position: absolute; top: 4px; right: 4px; width: 28px; height: 28px;
    background: rgba(0,0,0,0.55); color: #fff; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; cursor: pointer;
    line-height: 1; transition: background var(--transition-fast);
  }
  .part-edit-btn .icon { width: 14px; height: 14px; }
  .part-edit-btn:hover { background: rgba(0,0,0,0.8); }
  .part-edit-menu {
    position: absolute; top: 34px; right: 4px; z-index: 5;
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: var(--radius-md); box-shadow: var(--shadow-md);
    display: none; flex-direction: column; min-width: 168px; overflow: hidden;
  }
  .part-edit-menu.open { display: flex; }
  .part-edit-menu button {
    padding: 8px 12px; background: none; border: none; text-align: left;
    font-size: 13px; color: var(--color-text); cursor: pointer;
  }
  .part-edit-menu button:hover { background: var(--color-accent-soft); }
  .part-delete-btn {
    position: absolute; top: 4px; left: 4px; width: 28px; height: 28px;
    background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; cursor: pointer;
    line-height: 1; transition: background var(--transition-fast);
  }
  .part-delete-btn .icon { width: 14px; height: 14px; }
  .part-delete-btn:hover { background: #d32f2f; }

  .add-part-btn {
    width: 100%; padding: 14px; background: var(--color-surface); border: 2px dashed #90a4ae;
    border-radius: var(--radius-lg); color: var(--color-accent); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    flex-shrink: 0;
    transition: border-color var(--transition-fast), background var(--transition-fast);
  }
  .add-part-btn:hover { border-color: var(--color-accent); background: var(--color-accent-soft); }
  .add-part-btn.dragover { border-color: var(--color-accent); background: var(--color-accent-soft); }
  .add-part-btn .icon { width: 18px; height: 18px; }

  button.primary {
    padding: 8px 16px; background: var(--color-accent); color: #fff; border: none;
    border-radius: var(--radius-md); cursor: pointer; font-size: 14px;
    display: inline-flex; align-items: center; gap: 6px; transition: background var(--transition-fast);
  }
  button.primary:hover { background: var(--color-accent-dark); }

  /* プレビュー列（工事番号列・サムネイル列を除いた残り全体を使う） */
  .preview-column {
    flex: 1; min-width: 0; min-height: 0;
    display: flex; align-items: stretch; justify-content: center;
  }
  #previewPlaceholder {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
    background: var(--color-surface); border: 1px dashed var(--color-border-strong); border-radius: var(--radius-lg);
    color: var(--color-text-muted); font-size: 14px;
  }
  #previewPanel {
    display: none; flex-direction: column;
    width: 100%; height: 100%;
    background: var(--color-viewer-bg); border-radius: var(--radius-lg); overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  #previewHeader {
    flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--color-viewer-panel); color: #fff; font-size: 13px;
  }
  #previewTitleBlock { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  #previewTitle { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #previewMeta { font-size: 11px; color: #9aa5ab; }
  #previewHeader .actions { display: flex; align-items: center; }
  #previewHeader .actions button {
    margin-left: 8px; padding: 6px 12px; border: none; border-radius: var(--radius-md);
    cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px;
    transition: background var(--transition-fast);
  }
  #previewHeader .actions button .icon { width: 14px; height: 14px; }
  #fullscreenBtn { background: var(--color-accent); color: #fff; }
  #fullscreenBtn:hover { background: var(--color-accent-dark); }
  #resetViewBtn, .bg-swatch-btn { background: #3a3a3a; color: #fff; }
  #resetViewBtn:hover { background: #4a4a4a; }
  #closePreviewBtn { background: #444; color: #fff; }
  #closePreviewBtn:hover { background: #333; }
  #previewViewer { position: relative; flex: 1; min-height: 0; }
  #previewStatus {
    position: absolute; top: 10px; left: 10px; color: #fff;
    background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: var(--radius-md); font-size: 12px;
  }

  /* 読み込み中スピナー */
  .viewer-spinner {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .viewer-spinner .ring {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,.2); border-top-color: #fff;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 操作ヒント */
  .viewer-hint {
    position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.6); color: #fff; padding: 8px 16px; border-radius: 20px;
    font-size: 12px; white-space: nowrap; pointer-events: none;
    transition: opacity .6s ease;
  }
  .viewer-hint .icon { width: 14px; height: 14px; }

  /* 背景色スウォッチ */
  .bg-swatch-group { display: flex; gap: 4px; margin-left: 8px; }
  .bg-swatch-btn {
    width: 22px; height: 22px; border-radius: 50%; padding: 0; cursor: pointer;
    border: 2px solid transparent;
  }
  .bg-swatch-btn.active { border-color: var(--color-accent); }
  .bg-swatch-dark { background: #1a1a1a; }
  .bg-swatch-light { background: #f2f2f2; }
  .bg-swatch-gray { background: #6b7280; }

  /* 検索履歴 */
  .recent-machines { padding: 10px 12px; border-bottom: 1px solid var(--color-border); }
  .recent-machines h2 {
    margin: 0 0 6px; font-size: 11px; font-weight: 700; letter-spacing: .04em;
    color: var(--color-text-muted); text-transform: uppercase;
  }
  .recent-machine-btn {
    display: flex; align-items: center; gap: 6px; width: 100%; text-align: left;
    padding: 6px 8px; border: none; background: none; cursor: pointer;
    font-size: 14px; color: var(--color-text); border-radius: var(--radius-sm);
  }
  .recent-machine-btn:hover { background: var(--color-bg); }
  .recent-machine-btn .icon { width: 14px; height: 14px; flex-shrink: 0; color: var(--color-text-muted); }
  .recent-machine-btn .recent-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* アップロードモーダル */
  #uploadOverlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    align-items: center; justify-content: center; z-index: 100;
  }
  #uploadModal {
    background: var(--color-surface); border-radius: var(--radius-lg); padding: 36px; width: 100%; max-width: 640px;
    box-shadow: var(--shadow-lg);
  }
  #uploadModal h2 { font-size: 24px; margin: 0 0 6px; color: var(--color-text); }
  #uploadContext { margin: 0; color: var(--color-text-muted); font-size: 15px; }
  #uploadModal .upload-field { margin-top: 24px; }
  #uploadModal label { display: block; font-size: 16px; font-weight: 700; color: var(--color-text); margin-bottom: 8px; }
  #uploadModal input[type="text"], #uploadModal input[type="file"] {
    width: 100%; padding: 12px; box-sizing: border-box; font-size: 16px; color: var(--color-text);
    border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface);
  }
  #uploadModal .modal-actions { margin-top: 28px; display: flex; gap: 10px; }
  #uploadModal .modal-actions button.primary { padding: 12px 24px; font-size: 16px; }
  #uploadModal button.secondary {
    padding: 12px 24px; background: var(--color-surface-alt); color: var(--color-text); border: none;
    border-radius: var(--radius-md); cursor: pointer; font-size: 16px;
  }
  #uploadModal button:disabled { background: #aaa; cursor: not-allowed; }
  #uploadStatus { margin-top: 16px; font-size: 14px; color: var(--color-text-muted); white-space: pre-wrap; }
  #uploadStatus.error { color: var(--color-danger); }
  #uploadStatus.success { color: var(--color-success); }

  .drop-zone {
    margin-top: 10px; border: 2px dashed var(--color-border-strong); border-radius: var(--radius-md);
    padding: 20px; text-align: center; color: var(--color-text-muted); font-size: 13px;
    transition: border-color var(--transition-fast), background var(--transition-fast);
  }
  .drop-zone.dragover { border-color: var(--color-accent); background: var(--color-accent-soft); }

  .thumb-candidates { display: none; gap: 8px; margin-top: 10px; }
  .thumb-candidates.visible { display: flex; }
  .thumb-candidates img {
    width: 84px; height: 63px; object-fit: cover; border-radius: var(--radius-md); cursor: pointer;
    border: 2px solid transparent; box-sizing: border-box;
  }
  .thumb-candidates img.selected { border-color: var(--color-accent); }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
  }
}
</script>
</head>
<body>

<header class="app-header">
  <h1><span id="headerIcon"></span><span>3D Model Capture</span></h1>
  <button class="theme-toggle-btn" id="themeToggleBtn" title="ダークモード切替"></button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-fixed">
      <div class="sidebar-search">
        <div class="sidebar-search-box">
          <span id="sidebarSearchIcon"></span>
          <input type="text" id="sidebarSearch" placeholder="工事番号・客先名で絞り込み">
        </div>
      </div>
      <div class="recent-machines" id="recentMachines" style="display:none;">
        <h2>検索履歴</h2>
        <div id="recentMachinesList"></div>
      </div>
    </div>
    <div id="sidebarStatus">読み込み中...</div>
    <div id="sidebarList"></div>
  </aside>

  <main class="main">
    <div id="mainContent"></div>
  </main>
</div>

<div id="uploadOverlay">
  <div id="uploadModal">
    <h2>3Dキャプチャ アップロード</h2>
    <p id="uploadContext"></p>

    <div class="upload-field">
      <label for="partLabel">パーツ番号・撮影箇所（任意・複数ファイル選択時は無視されファイル名が使われます）</label>
      <input type="text" id="partLabel" placeholder="例：①、正面、上部など">
    </div>

    <div class="upload-field">
      <label for="fileInput">3Dファイル（.splat / .ply / .ksplat / .spz / .sog・複数選択可）</label>
      <input type="file" id="fileInput" accept=".splat,.ply,.ksplat,.spz,.sog" multiple>
      <div class="drop-zone" id="dropZone">ここに3Dファイルをドラッグ&ドロップもできます</div>
      <div class="thumb-candidates" id="thumbnailCandidates"></div>
    </div>

    <div class="upload-field">
      <label for="thumbnailInput">サムネイル画像（任意・未指定なら自動撮影／複数ファイル選択時は無視されます）</label>
      <input type="file" id="thumbnailInput" accept="image/*">
      <div class="drop-zone" id="thumbnailDropZone">ここに画像をドラッグ&ドロップもできます</div>
    </div>

    <div class="modal-actions">
      <button class="primary" id="uploadBtn">アップロード</button>
      <button class="secondary" id="cancelUploadBtn">キャンセル</button>
    </div>

    <div id="uploadStatus"></div>
  </div>
</div>

<script type="module">
import { initViewer } from "./viewer-core.js";
import { fetchProjectMachineTree, fetchMachineFiles, uploadPart, updateThumbnail, updatePartLabel, deletePart, reorderParts, captureThumbnailCandidates, splatFileTypeFromFileName } from "./upload-core.js";
import { ICON_SUN, ICON_MOON, ICON_SEARCH, ICON_EDIT, ICON_CUBE, ICON_PLUS,
         ICON_EXPAND, ICON_CLOSE, ICON_RESET, ICON_CLOCK, ICON_TRASH, ICON_CHEVRON, ICON_GEAR } from "./icons.js";

const sidebarStatus = document.getElementById("sidebarStatus");
const sidebarList = document.getElementById("sidebarList");
const sidebarSearchInput = document.getElementById("sidebarSearch");
const mainContent = document.getElementById("mainContent");
const headerIcon = document.getElementById("headerIcon");
const themeToggleBtn = document.getElementById("themeToggleBtn");
const sidebarSearchIcon = document.getElementById("sidebarSearchIcon");
const recentMachinesSection = document.getElementById("recentMachines");
const recentMachinesList = document.getElementById("recentMachinesList");

headerIcon.innerHTML = ICON_GEAR;
sidebarSearchIcon.innerHTML = ICON_SEARCH;

// ---- ライト/ダークモード切替（localStorageに保存） ----
const THEME_KEY = "3dmodel-theme";
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  themeToggleBtn.innerHTML = theme === "dark" ? ICON_SUN : ICON_MOON;
  themeToggleBtn.title = theme === "dark" ? "ライトモードに切替" : "ダークモードに切替";
}
applyTheme(localStorage.getItem(THEME_KEY) === "light" ? "light" : "dark");
themeToggleBtn.onclick = () => {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
};

function formatDateTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ---- 検索履歴（localStorageに保存、最大6件） ----
const RECENT_KEY = "3dmodel-recent-machines";
function loadRecentMachines() {
  try {
    return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
  } catch {
    return [];
  }
}
function saveRecentMachine(project, machineName) {
  const recent = loadRecentMachines().filter(
    (r) => !(r.num === project.num && r.machine === machineName)
  );
  recent.unshift({ num: project.num, customer: project.customer, machine: machineName });
  localStorage.setItem(RECENT_KEY, JSON.stringify(recent.slice(0, 6)));
  renderRecentMachines();
}
function renderRecentMachines() {
  const recent = loadRecentMachines().slice(0, 3);
  recentMachinesSection.style.display = recent.length ? "block" : "none";
  recentMachinesList.innerHTML = "";
  recent.forEach((r) => {
    const btn = document.createElement("button");
    btn.className = "recent-machine-btn";
    btn.innerHTML = `${ICON_CLOCK}<span class="recent-label">${r.num}　${r.machine}</span>`;
    btn.onclick = () => {
      const project = tree.find((p) => p.num === r.num);
      if (!project) return;
      expandedNums.add(project.num);
      selectMachine(project, r.machine);
    };
    recentMachinesList.appendChild(btn);
  });
}

// ---- 左：工事番号一覧（工程表の全件から作成） ----
async function loadTree() {
  sidebarStatus.textContent = "読み込み中...";
  try {
    const allProjects = await fetchProjectMachineTree();
    // 工事番号2000番台のみ表示（一時的な絞り込み）
    tree = allProjects.filter((project) => {
      const n = parseInt(project.num, 10);
      return !isNaN(n) && n >= 2000 && n <= 2999;
    });
    sidebarStatus.textContent = "";
    renderRecentMachines();
    renderSidebar();
    renderMain();
  } catch (err) {
    sidebarStatus.textContent = "読み込みエラー：" + err.message;
  }
}

sidebarSearchInput.addEventListener("input", () => {
  searchQuery = sidebarSearchInput.value.trim().toLowerCase();
  renderSidebar();
});

function renderSidebar() {
  sidebarList.innerHTML = "";
  const visibleProjects = searchQuery
    ? tree.filter((project) =>
        project.num.toLowerCase().includes(searchQuery) ||
        (project.customer || "").toLowerCase().includes(searchQuery))
    : tree;

  if (searchQuery && visibleProjects.length === 0) {
    const empty = document.createElement("div");
    empty.className = "sidebar-empty-msg";
    empty.textContent = "該当する案件が見つかりません";
    sidebarList.appendChild(empty);
  }

  visibleProjects.forEach((project) => {
    const projectDiv = document.createElement("div");
    projectDiv.className = "sidebar-project";

    const isExpanded = expandedNums.has(project.num);
    const isSelectedProject = currentProject?.num === project.num;
    const item = document.createElement("div");
    item.className = "sidebar-item" + (isExpanded ? " expanded" : "") + (isSelectedProject && currentMachine ? " has-selection" : "");

    const chevron = document.createElement("span");
    chevron.className = "sidebar-item-chevron";
    chevron.innerHTML = ICON_CHEVRON;
    item.appendChild(chevron);

    const text = document.createElement("div");
    text.className = "sidebar-item-text";

    const num = document.createElement("span");
    num.className = "sidebar-item-num";
    num.textContent = project.num;
    text.appendChild(num);

    if (project.customer) {
      const customer = document.createElement("span");
      customer.className = "sidebar-item-customer";
      customer.textContent = project.customer;
      text.appendChild(customer);
    }

    item.appendChild(text);
    item.onclick = () => toggleProject(project);
    projectDiv.appendChild(item);

    if (isExpanded) {
      const machinesDiv = document.createElement("div");
      machinesDiv.className = "sidebar-machines";
      if (project.machines.length === 0) {
        const empty = document.createElement("div");
        empty.className = "sidebar-machine-empty";
        empty.textContent = "機械名の登録がありません";
        machinesDiv.appendChild(empty);
      } else {
        project.machines.forEach((machineName) => {
          const btn = document.createElement("button");
          btn.className = "sidebar-machine-btn" + (isSelectedProject && currentMachine === machineName ? " active" : "");
          btn.textContent = machineName;
          btn.onclick = () => selectMachine(project, machineName);
          machinesDiv.appendChild(btn);
        });
      }
      projectDiv.appendChild(machinesDiv);
    }

    sidebarList.appendChild(projectDiv);
  });
}

function toggleProject(project) {
  if (expandedNums.has(project.num)) {
    expandedNums.delete(project.num);
    if (currentProject?.num === project.num) {
      currentProject = null;
      currentMachine = null;
      closePreview();
      renderMain();
    }
  } else {
    expandedNums.add(project.num);
  }
  renderSidebar();
}

function selectMachine(project, machineName) {
  currentProject = project;
  currentMachine = machineName;
  closePreview();
  saveRecentMachine(currentProject, machineName);
  renderSidebar();
  renderMain();
}

// ---- サムネイルカードのドラッグ&ドロップによる並べ替え ----
function getDragAfterElement(container, y) {
  const cards = [...container.querySelectorAll(".part-card:not(.dragging)")];
  return cards.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY, element: null }).element;
}

function setupPartsDragAndDrop(container) {
  const indicator = document.createElement("div");
  indicator.className = "drop-indicator";

  container.addEventListener("dragover", (e) => {
    const dragging = container.querySelector(".part-card.dragging");
    if (!dragging) return;
    e.preventDefault();
    const afterElement = getDragAfterElement(container, e.clientY);
    if (afterElement) {
      container.insertBefore(indicator, afterElement);
    } else {
      container.appendChild(indicator);
    }
  });

  container.addEventListener("dragleave", (e) => {
    if (!container.contains(e.relatedTarget)) indicator.remove();
  });

  container.addEventListener("dragend", () => {
    indicator.remove();
  });

  container.addEventListener("drop", async (e) => {
    const dragging = container.querySelector(".part-card.dragging");
    if (!dragging) return;
    e.preventDefault();
    container.insertBefore(dragging, indicator);
    indicator.remove();
    const orderedIds = [...container.querySelectorAll(".part-card")].map((c) => c.dataset.fileId);
    try {
      await reorderParts(orderedIds);
    } catch (err) {
      console.error(err);
      if (partsStatusEl) partsStatusEl.textContent = "並び順の保存に失敗しました：" + (err.message || err);
    }
  });
}

async function loadMachineFiles() {
  if (!partsStatusEl || !thumbListEl) return;
  partsStatusEl.textContent = "読み込み中...";

  try {
    const files = await fetchMachineFiles(currentProject.num, currentMachine);
    thumbListEl.querySelectorAll(".part-card").forEach(el => el.remove());
    partsStatusEl.textContent = files.length === 0 ? "アップロード済みの3Dモデルはまだありません" : "";

    files.forEach((file) => thumbListEl.appendChild(buildPartCard(file)));
  } catch (err) {
    partsStatusEl.textContent = "読み込みエラー：" + err.message;
  }
}

  card.className = "part-card";

  card.addEventListener("dragstart", () => {
    card.classList.add("dragging");
  });
  card.addEventListener("dragend", () => {
    card.classList.remove("dragging");
  });

  const thumbBtn = document.createElement("button");
  thumbBtn.className = "part-thumb-btn";
  if (file.thumbnail_url) {
    const img = document.createElement("img");
    img.className = "part-thumb";
    img.src = file.thumbnail_url;
    img.alt = "";
    thumbBtn.appendChild(img);
  } else {
    const placeholder = document.createElement("span");
    placeholder.className = "part-thumb-placeholder";
    placeholder.innerHTML = ICON_CUBE;
    thumbBtn.appendChild(placeholder);
  }
  thumbBtn.onclick = () => openPreview(file);
  card.appendChild(thumbBtn);

  const editBtn = document.createElement("button");
  editBtn.type = "button";
  editBtn.className = "part-edit-btn";
  editBtn.title = "編集";
  editBtn.innerHTML = ICON_EDIT;

  const editInput = document.createElement("input");
  editInput.type = "file";
  editInput.accept = "image/*";
  editInput.style.display = "none";
  editInput.onchange = async () => {
    const chosen = editInput.files[0];
    if (!chosen) return;
    editBtn.innerHTML = "…";
    try {
      await updateThumbnail(file.id, chosen);
      await loadMachineFiles();
    } catch (err) {
      console.error(err);
      if (partsStatusEl) partsStatusEl.textContent = "サムネイルの更新に失敗しました：" + (err.message || err);
      editBtn.innerHTML = ICON_EDIT;
    }
  };

  const editMenu = document.createElement("div");
  editMenu.className = "part-edit-menu";

  const closeEditMenu = () => editMenu.classList.remove("open");

  const thumbMenuItem = document.createElement("button");
  thumbMenuItem.type = "button";
  thumbMenuItem.textContent = "サムネイル画像を変更";
  thumbMenuItem.onclick = (e) => {
    e.stopPropagation();
    closeEditMenu();
    editInput.click();
  };

  const nameMenuItem = document.createElement("button");
  nameMenuItem.type = "button";
  nameMenuItem.textContent = "ファイル名を編集";
  nameMenuItem.onclick = async (e) => {
    e.stopPropagation();
    closeEditMenu();
    const current = file.part_label || "";
    const next = prompt("ファイル名（パーツ番号）を入力してください", current);
    if (next === null) return;
    const trimmed = next.trim();
    if (trimmed === current) return;
    try {
      await updatePartLabel(file.id, trimmed);
      await loadMachineFiles();
    } catch (err) {
      console.error(err);
      if (partsStatusEl) partsStatusEl.textContent = "ファイル名の更新に失敗しました：" + (err.message || err);
    }
  };

  editMenu.appendChild(thumbMenuItem);
  editMenu.appendChild(nameMenuItem);

  editBtn.onclick = (e) => {
    e.stopPropagation();
    document.querySelectorAll(".part-edit-menu.open").forEach((m) => { if (m !== editMenu) m.classList.remove("open"); });
    editMenu.classList.toggle("open");
  };

  card.appendChild(editBtn);
  card.appendChild(editMenu);
  card.appendChild(editInput);

  const deleteBtn = document.createElement("button");
  deleteBtn.className = "part-delete-btn";
  deleteBtn.title = "削除";
  deleteBtn.innerHTML = ICON_TRASH;
  deleteBtn.onclick = async () => {
    if (!confirm(`「${file.part_label || "表示"}」を削除しますか？この操作は取り消せません。`)) return;
    deleteBtn.innerHTML = "…";
    deleteBtn.disabled = true;
    try {
      await deletePart(file.id);
      await loadMachineFiles();
    } catch (err) {
      console.error(err);
      if (partsStatusEl) partsStatusEl.textContent = "削除に失敗しました：" + (err.message || err);
      deleteBtn.innerHTML = ICON_TRASH;
      deleteBtn.disabled = false;
    }
  };
  card.appendChild(deleteBtn);

  const label = document.createElement("span");
  label.textContent = file.part_label || "表示";
  card.appendChild(label);

  return card;
}

  previewTitle.textContent = `${currentMachine}　${file.part_label || ""}`;

    background: selectedBackground,
    onStatus: (msg) => { previewStatus.textContent = msg; },

// ---- サムネイル候補（単体ファイル選択時のみ、4アングルを自動撮影して選ばせる） ----
let candidateBlobs = [];
let candidateObjectUrls = [];
let selectedCandidateIndex = -1;
let candidateSourceUrl = null;

function clearThumbnailCandidates() {
  candidateObjectUrls.forEach((url) => URL.revokeObjectURL(url));
  if (candidateSourceUrl) URL.revokeObjectURL(candidateSourceUrl);
  candidateBlobs = [];
  candidateObjectUrls = [];
  selectedCandidateIndex = -1;
  candidateSourceUrl = null;
  thumbnailCandidatesEl.innerHTML = "";
  thumbnailCandidatesEl.classList.remove("visible");
}

function renderThumbnailCandidates() {
  thumbnailCandidatesEl.innerHTML = "";
  candidateObjectUrls.forEach((url, i) => {
    const img = document.createElement("img");
    img.src = url;
    img.className = i === selectedCandidateIndex ? "selected" : "";
    img.title = "クリックでこの画像をサムネイルに選択";
    img.addEventListener("click", () => {
      selectedCandidateIndex = i;
      renderThumbnailCandidates();
    });
    thumbnailCandidatesEl.appendChild(img);
  });
  thumbnailCandidatesEl.classList.add("visible");
}

async function generateThumbnailCandidates(file) {
  clearThumbnailCandidates();
  candidateSourceUrl = URL.createObjectURL(file);
  setUploadStatus("サムネイル候補を生成中...");
  try {
    const blobs = await captureThumbnailCandidates(candidateSourceUrl);
    candidateBlobs = blobs;
    candidateObjectUrls = blobs.map((b) => URL.createObjectURL(b));
    selectedCandidateIndex = 0;
    renderThumbnailCandidates();
    setUploadStatus("");
  } catch (err) {
    console.error(err);
    clearThumbnailCandidates();
    setUploadStatus("サムネイル候補の生成に失敗しました（アップロード時は自動生成にフォールバックします）", "error");
  }
}

function handleFileInputChanged() {
  const files = [...fileInput.files];
  if (files.length === 1) {
    generateThumbnailCandidates(files[0]);
  } else {
    clearThumbnailCandidates();
  }
}

// ---- ドラッグ&ドロップでファイルを選択（3Dファイル・サムネイル画像共通） ----
function describeFiles(fileList) {
  if (!fileList || fileList.length === 0) return null;
  if (fileList.length === 1) return `選択中：${fileList[0].name}`;
  return `選択中：${fileList.length}件（${fileList[0].name} 他）`;
}

function setupDropZone(zone, input, defaultText, onFilesChanged) {
  ["dragenter", "dragover"].forEach((evt) => {
    zone.addEventListener(evt, (e) => {
      e.preventDefault();
      zone.classList.add("dragover");
    });
  });
  ["dragleave", "dragend"].forEach((evt) => {
    zone.addEventListener(evt, () => zone.classList.remove("dragover"));
  });
  zone.addEventListener("drop", (e) => {
    e.preventDefault();
    zone.classList.remove("dragover");
    const dropped = e.dataTransfer.files;
    if (!dropped || dropped.length === 0) return;
    input.files = dropped;
    zone.textContent = describeFiles(dropped) || defaultText;
    onFilesChanged?.();
  });
  input.addEventListener("change", () => {
    zone.textContent = describeFiles(input.files) || defaultText;
    onFilesChanged?.();
  });
}

// 拡張子を除いたファイル名をパーツラベルとして使う（複数ファイル選択時）
function labelFromFileName(fileName) {
  return fileName.replace(/\.[^.]+$/, "");
}

  if (files.length === 0) return setUploadStatus("ファイルを選択してください", "error");

  const isBatch = files.length > 1;
  const thumbnailBlob = !isBatch && selectedCandidateIndex >= 0 ? candidateBlobs[selectedCandidateIndex] : null;

  uploadBtn.disabled = true;
  const failed = [];
  try {
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const label = isBatch ? labelFromFileName(file.name) : partLabel;
      try {
        await uploadPart({
          projectNumber: currentProject.num,
          machineName: currentMachine,
          partLabel: label,
          file,
          thumbnailFile: isBatch ? null : thumbnailFile,
          thumbnailBlob: isBatch ? null : thumbnailBlob,
        }, (msg) => setUploadStatus(isBatch ? `[${i + 1}/${files.length}] ${file.name}：${msg}` : msg));
      } catch (err) {
        console.error(err);
        failed.push({ name: file.name, message: err.message || String(err) });
      }
    }

    if (failed.length === 0) {
      setUploadStatus(isBatch ? `アップロード完了しました！（${files.length}件）` : "アップロード完了しました！", "success");
    } else {
      const failedList = failed.map((f) => `${f.name}：${f.message}`).join("\n");
      setUploadStatus(
        `${files.length - failed.length}/${files.length}件アップロードしました。失敗：\n${failedList}`,
        "error"
      );
    }
    partLabelInput.value = "";
    fileInput.value = "";
    thumbnailInput.value = "";
    dropZone.textContent = dropZoneDefaultText;
    thumbnailDropZone.textContent = thumbnailDropZoneDefaultText;
    clearThumbnailCandidates();
    await loadMachineFiles();
    if (failed.length === 0) setTimeout(closeUploadModal, 800);
  } finally {
    uploadBtn.disabled = false;
  }
});

loadTree();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3Dモデルキャプチャ</title>
<style>
  :root {
    --color-bg: #eef1f3;
    --color-surface: #fff;
    --color-surface-alt: #f7f9fa;
    --color-border: #dfe3e6;
    --color-border-strong: #cfd8dc;
    --color-text: #263238;
    --color-text-muted: #78909c;
    --color-accent: #1565c0;
    --color-accent-dark: #0d47a1;
    --color-accent-soft: #e3f2fd;
    --color-header-start: #34495e;
    --color-header-end: #2c3e50;
    --color-danger: #c0392b;
    --color-success: #1a7f37;
    --color-viewer-bg: #1a1a1a;
    --color-viewer-panel: #262626;

    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;

    --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 2px 6px rgba(0,0,0,.12);
    --shadow-lg: 0 6px 16px rgba(0,0,0,.16);

    --transition-fast: .15s ease;
  }

  html[data-theme="dark"] {
    --color-bg: #14181b;
    --color-surface: #1e2429;
    --color-surface-alt: #262d33;
    --color-border: #333c42;
    --color-border-strong: #3d474e;
    --color-text: #dce3e8;
    --color-text-muted: #8ea0ab;
    --color-accent: #4d9de8;
    --color-accent-dark: #7fbcf2;
    --color-accent-soft: #1f3a52;
    --color-header-start: #1c2226;
    --color-header-end: #12171a;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Yu Gothic UI", "メイリオ", Meiryo, sans-serif; font-size: 13px; color: var(--color-text);
    background: var(--color-bg); margin: 0;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    transition: background var(--transition-fast), color var(--transition-fast);
  }

  .app-header {
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--color-header-start), var(--color-header-end)); color: #fff;
    padding: 10px 16px; box-shadow: var(--shadow-md);
    display: flex; align-items: center; justify-content: space-between;
  }
  .app-header h1 { margin: 0; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 0; }
  .app-header #headerIcon { font-size: 18px; line-height: 1; }

  .theme-toggle-btn {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
    background: rgba(255,255,255,.12); color: #fff; transition: background var(--transition-fast);
  }
  .theme-toggle-btn:hover { background: rgba(255,255,255,.22); }
  .theme-toggle-btn .icon { width: 18px; height: 18px; }

  .layout { display: flex; align-items: stretch; flex: 1; min-height: 0; }

  /* 左：工事番号一覧（工事番号の下に機械名をネストして表示） */
  .sidebar { width: 200px; flex-shrink: 0; background: var(--color-surface); border-right: 1px solid var(--color-border); overflow-y: auto; }
  #sidebarStatus, .sidebar-empty-msg { padding: 10px 16px; color: var(--color-text-muted); font-size: 12px; }

  .sidebar-fixed { position: sticky; top: 0; z-index: 1; background: var(--color-surface); }
  .sidebar-search { padding: 10px 12px; border-bottom: 1px solid var(--color-border); background: var(--color-surface); }
  .sidebar-search-box { position: relative; display: flex; align-items: center; }
  .sidebar-search-box .icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--color-text-muted); pointer-events: none; }
  #sidebarSearch {
    width: 100%; padding: 7px 8px 7px 28px; font-size: 13px; color: var(--color-text);
    border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg);
    transition: border-color var(--transition-fast);
  }
  #sidebarSearch:focus { outline: none; border-color: var(--color-accent); }

  .sidebar-project { border-bottom: 2px solid var(--color-border-strong); }
  .sidebar-item { padding: 12px 16px; cursor: pointer; font-size: 16px; transition: background var(--transition-fast); }
  .sidebar-item:hover { background: var(--color-bg); }
  .sidebar-item.active { background: var(--color-accent-soft); color: var(--color-accent-dark); box-shadow: inset 4px 0 0 var(--color-accent); transition: box-shadow var(--transition-fast), background var(--transition-fast); }
  .sidebar-item-num { font-weight: 700; }
  .sidebar-item .sidebar-item-customer { display: block; font-size: 14px; font-weight: 400; color: var(--color-text-muted); margin-top: 2px; }
  .sidebar-item.active .sidebar-item-customer { color: var(--color-accent-dark); }

  .sidebar-machines { background: var(--color-surface-alt); padding: 4px 0; }
  .sidebar-machine-btn {
    display: block; width: 100%; text-align: left; padding: 8px 16px 8px 32px;
    border: none; background: none; cursor: pointer; font-size: 14px; color: var(--color-text);
    transition: background var(--transition-fast);
  }
  .sidebar-machine-btn:hover { background: var(--color-bg); }
  .sidebar-machine-btn.active { background: var(--color-accent-soft); color: var(--color-accent-dark); box-shadow: inset 4px 0 0 var(--color-accent); }
  .sidebar-machine-empty { padding: 8px 16px 8px 32px; color: var(--color-text-muted); font-size: 13px; }

  /* 右：メインエリア */
  .main { flex: 1; padding: 24px; min-width: 0; min-height: 0; display: flex; flex-direction: column; }
  .main-placeholder { color: var(--color-text-muted); font-size: 13px; }

  #mainContent { flex: 1; min-height: 0; display: flex; flex-direction: column; }

  /* パンくずリスト */
  .breadcrumb {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    font-size: 17px; color: var(--color-text-muted); margin-bottom: 14px;
  }
  .breadcrumb .crumb { color: var(--color-text); }
  .breadcrumb .crumb.current { color: var(--color-accent); font-weight: 700; }
  .breadcrumb .sep { color: var(--color-border-strong); }

  /* サムネイル列とプレビュー列の横並び */
  .content-columns { flex: 1; min-height: 0; display: flex; gap: 24px; align-items: stretch; }

  .thumb-column { width: 260px; flex-shrink: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .part-card { position: relative; width: 100%; display: flex; flex-direction: column;
    align-items: center; gap: 6px; font-size: 14px; }
  .part-thumb-btn { padding: 8px; background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: var(--radius-lg); cursor: pointer; width: 100%; box-shadow: var(--shadow-sm);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast); }
  .part-thumb-btn:hover { border-color: var(--color-accent); box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .part-thumb, .part-thumb-placeholder {
    width: 100%; aspect-ratio: 4 / 3; border-radius: var(--radius-sm); object-fit: cover; display: block;
  }
  .part-thumb-placeholder {
    background: var(--color-accent); color: #fff; display: flex; align-items: center;
    justify-content: center; font-size: 24px;
  }
  .part-thumb-placeholder .icon { width: 28px; height: 28px; }
  .part-edit-btn {
    position: absolute; top: 4px; right: 4px; width: 28px; height: 28px;
    background: rgba(0,0,0,0.55); color: #fff; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; cursor: pointer;
    line-height: 1; transition: background var(--transition-fast);
  }
  .part-edit-btn .icon { width: 14px; height: 14px; }
  .part-edit-btn:hover { background: rgba(0,0,0,0.8); }
  .part-edit-btn input { display: none; }

  .add-part-btn {
    width: 100%; padding: 14px; background: var(--color-surface); border: 2px dashed #90a4ae;
    border-radius: var(--radius-lg); color: var(--color-accent); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: border-color var(--transition-fast), background var(--transition-fast);
  }
  .add-part-btn:hover { border-color: var(--color-accent); background: var(--color-accent-soft); }
  .add-part-btn.dragover { border-color: var(--color-accent); background: var(--color-accent-soft); }
  .add-part-btn .icon { width: 18px; height: 18px; }

  button.primary {
    padding: 8px 16px; background: var(--color-accent); color: #fff; border: none;
    border-radius: var(--radius-md); cursor: pointer; font-size: 14px;
    display: inline-flex; align-items: center; gap: 6px; transition: background var(--transition-fast);
  }
  button.primary:hover { background: var(--color-accent-dark); }

  /* プレビュー列（工事番号列・サムネイル列を除いた残り全体を使う） */
  .preview-column {
    flex: 1; min-width: 0; min-height: 0;
    display: flex; align-items: stretch; justify-content: center;
  }
  #previewPlaceholder {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
    background: var(--color-surface); border: 1px dashed var(--color-border-strong); border-radius: var(--radius-lg);
    color: var(--color-text-muted); font-size: 14px;
  }
  #previewPanel {
    display: none; flex-direction: column;
    width: 100%; height: 100%;
    background: var(--color-viewer-bg); border-radius: var(--radius-lg); overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  #previewHeader {
    flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--color-viewer-panel); color: #fff; font-size: 13px;
  }
  #previewTitleBlock { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  #previewTitle { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #previewMeta { font-size: 11px; color: #9aa5ab; }
  #previewHeader .actions { display: flex; align-items: center; }
  #previewHeader .actions button {
    margin-left: 8px; padding: 6px 12px; border: none; border-radius: var(--radius-md);
    cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px;
    transition: background var(--transition-fast);
  }
  #previewHeader .actions button .icon { width: 14px; height: 14px; }
  #fullscreenBtn { background: var(--color-accent); color: #fff; }
  #fullscreenBtn:hover { background: var(--color-accent-dark); }
  #resetViewBtn, .bg-swatch-btn { background: #3a3a3a; color: #fff; }
  #resetViewBtn:hover { background: #4a4a4a; }
  #closePreviewBtn { background: #444; color: #fff; }
  #closePreviewBtn:hover { background: #333; }
  #previewViewer { position: relative; flex: 1; min-height: 0; }
  #previewStatus {
    position: absolute; top: 10px; left: 10px; color: #fff;
    background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: var(--radius-md); font-size: 12px;
  }

  /* 読み込み中スピナー */
  .viewer-spinner {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .viewer-spinner .ring {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,.2); border-top-color: #fff;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 操作ヒント */
  .viewer-hint {
    position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.6); color: #fff; padding: 8px 16px; border-radius: 20px;
    font-size: 12px; white-space: nowrap; pointer-events: none;
    transition: opacity .6s ease;
  }
  .viewer-hint .icon { width: 14px; height: 14px; }

  /* 背景色スウォッチ */
  .bg-swatch-group { display: flex; gap: 4px; margin-left: 8px; }
  .bg-swatch-btn {
    width: 22px; height: 22px; border-radius: 50%; padding: 0; cursor: pointer;
    border: 2px solid transparent;
  }
  .bg-swatch-btn.active { border-color: var(--color-accent); }
  .bg-swatch-dark { background: #1a1a1a; }
  .bg-swatch-light { background: #f2f2f2; }
  .bg-swatch-gray { background: #6b7280; }

  /* 検索履歴 */
  .recent-machines { padding: 10px 12px; border-bottom: 1px solid var(--color-border); }
  .recent-machines h2 {
    margin: 0 0 6px; font-size: 11px; font-weight: 700; letter-spacing: .04em;
    color: var(--color-text-muted); text-transform: uppercase;
  }
  .recent-machine-btn {
    display: flex; align-items: center; gap: 6px; width: 100%; text-align: left;
    padding: 6px 8px; border: none; background: none; cursor: pointer;
    font-size: 15px; color: var(--color-text); border-radius: var(--radius-sm);
  }
  .recent-machine-btn:hover { background: var(--color-bg); }
  .recent-machine-btn .icon { width: 14px; height: 14px; flex-shrink: 0; color: var(--color-text-muted); }
  .recent-machine-btn .recent-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* アップロードモーダル */
  #uploadOverlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    align-items: center; justify-content: center; z-index: 100;
  }
  #uploadModal {
    background: var(--color-surface); border-radius: var(--radius-lg); padding: 24px; width: 100%; max-width: 420px;
    box-shadow: var(--shadow-lg);
  }
  #uploadModal h2 { font-size: 18px; margin: 0 0 4px; color: var(--color-text); }
  #uploadContext { margin: 0; color: var(--color-text-muted); }
  #uploadModal label { display: block; font-size: 13px; color: var(--color-text-muted); margin-top: 16px; margin-bottom: 4px; }
  #uploadModal input[type="text"], #uploadModal input[type="file"] {
    width: 100%; padding: 8px; box-sizing: border-box; font-size: 14px; color: var(--color-text);
    border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface);
  }
  #uploadModal .modal-actions { margin-top: 20px; display: flex; gap: 8px; }
  #uploadModal button.secondary {
    padding: 10px 20px; background: var(--color-surface-alt); color: var(--color-text); border: none;
    border-radius: var(--radius-md); cursor: pointer; font-size: 14px;
  }
  #uploadModal button:disabled { background: #aaa; cursor: not-allowed; }
  #uploadStatus { margin-top: 16px; font-size: 13px; color: var(--color-text-muted); white-space: pre-wrap; }
  #uploadStatus.error { color: var(--color-danger); }
  #uploadStatus.success { color: var(--color-success); }

  #dropZone {
    margin-top: 8px; border: 2px dashed var(--color-border-strong); border-radius: var(--radius-md);
    padding: 14px; text-align: center; color: var(--color-text-muted); font-size: 12px;
    transition: border-color var(--transition-fast), background var(--transition-fast);
  }
  #dropZone.dragover { border-color: var(--color-accent); background: var(--color-accent-soft); }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
  }
}
</script>
</head>
<body>

<header class="app-header">
  <h1><span id="headerIcon"></span><span>3Dモデルキャプチャ</span></h1>
  <button class="theme-toggle-btn" id="themeToggleBtn" title="ダークモード切替"></button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-fixed">
      <div class="sidebar-search">
        <div class="sidebar-search-box">
          <span id="sidebarSearchIcon"></span>
          <input type="text" id="sidebarSearch" placeholder="工事番号・客先名で絞り込み">
        </div>
      </div>
      <div class="recent-machines" id="recentMachines" style="display:none;">
        <h2>検索履歴</h2>
        <div id="recentMachinesList"></div>
      </div>
    </div>
    <div id="sidebarStatus">読み込み中...</div>
    <div id="sidebarList"></div>
  </aside>

  <main class="main">
    <div id="mainContent"></div>
  </main>
</div>

<div id="uploadOverlay">
  <div id="uploadModal">
    <h2>3Dキャプチャ アップロード</h2>
    <p id="uploadContext"></p>

    <label for="partLabel">パーツ番号・撮影箇所（任意）</label>
    <input type="text" id="partLabel" placeholder="例：①、正面、上部など">

    <label for="fileInput">3Dファイル（.splat / .ply / .ksplat / .spz / .sog）</label>
    <input type="file" id="fileInput" accept=".splat,.ply,.ksplat,.spz,.sog">
    <div id="dropZone">ここに3Dファイルをドラッグ&ドロップもできます</div>

    <label for="thumbnailInput">サムネイル画像（任意・未指定なら自動撮影）</label>
    <input type="file" id="thumbnailInput" accept="image/*">

    <div class="modal-actions">
      <button class="primary" id="uploadBtn">アップロード</button>
      <button class="secondary" id="cancelUploadBtn">キャンセル</button>
    </div>

    <div id="uploadStatus"></div>
  </div>
</div>

<script type="module">
import { initViewer } from "./viewer-core.js";
import { fetchProjectMachineTree, fetchMachineFiles, uploadPart, updateThumbnail } from "./upload-core.js";
import { ICON_SUN, ICON_MOON, ICON_SEARCH, ICON_EDIT, ICON_CUBE, ICON_PLUS,
         ICON_EXPAND, ICON_CLOSE, ICON_RESET, ICON_CLOCK } from "./icons.js";

const sidebarStatus = document.getElementById("sidebarStatus");
const sidebarList = document.getElementById("sidebarList");
const sidebarSearchInput = document.getElementById("sidebarSearch");
const mainContent = document.getElementById("mainContent");
const headerIcon = document.getElementById("headerIcon");
const themeToggleBtn = document.getElementById("themeToggleBtn");
const sidebarSearchIcon = document.getElementById("sidebarSearchIcon");
const recentMachinesSection = document.getElementById("recentMachines");
const recentMachinesList = document.getElementById("recentMachinesList");

headerIcon.textContent = "⚙️";
sidebarSearchIcon.innerHTML = ICON_SEARCH;

// ---- ライト/ダークモード切替（localStorageに保存） ----
const THEME_KEY = "3dmodel-theme";
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  themeToggleBtn.innerHTML = theme === "dark" ? ICON_SUN : ICON_MOON;
  themeToggleBtn.title = theme === "dark" ? "ライトモードに切替" : "ダークモードに切替";
}
applyTheme(localStorage.getItem(THEME_KEY) === "dark" ? "dark" : "light");
themeToggleBtn.onclick = () => {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
};

// サムネイル一覧・プレビュー列は機械名を選ぶたびに作り直すため、要素参照はletで保持する
let previewPlaceholder = null;
let previewPanel = null;
let previewTitle = null;
let previewMeta = null;
let previewViewer = null;
let previewStatus = null;

const uploadOverlay = document.getElementById("uploadOverlay");
const uploadContext = document.getElementById("uploadContext");
const cancelUploadBtn = document.getElementById("cancelUploadBtn");
const partLabelInput = document.getElementById("partLabel");
const fileInput = document.getElementById("fileInput");
const dropZone = document.getElementById("dropZone");
const thumbnailInput = document.getElementById("thumbnailInput");
const uploadBtn = document.getElementById("uploadBtn");
const uploadStatusEl = document.getElementById("uploadStatus");

let tree = [];
let currentProject = null;   // { num, customer, machines }
let currentMachine = null;   // 機械名の文字列
let currentViewer = null;
let currentUrl = null;
let searchQuery = "";
let selectedBackground = 0x1a1a1a;

function formatDateTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ---- 最近表示した機械（localStorageに保存、最大6件） ----
const RECENT_KEY = "3dmodel-recent-machines";
function loadRecentMachines() {
  try {
    return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
  } catch {
    return [];
  }
}
function saveRecentMachine(project, machineName) {
  const recent = loadRecentMachines().filter(
    (r) => !(r.num === project.num && r.machine === machineName)
  );
  recent.unshift({ num: project.num, customer: project.customer, machine: machineName });
  localStorage.setItem(RECENT_KEY, JSON.stringify(recent.slice(0, 6)));
  renderRecentMachines();
}
function renderRecentMachines() {
  const recent = loadRecentMachines();
  recentMachinesSection.style.display = recent.length ? "block" : "none";
  recentMachinesList.innerHTML = "";
  recent.forEach((r) => {
    const btn = document.createElement("button");
    btn.className = "recent-machine-btn";
    btn.innerHTML = `${ICON_CLOCK}<span class="recent-label">${r.num}　${r.machine}</span>`;
    btn.onclick = () => {
      const project = tree.find((p) => p.num === r.num);
      if (!project) return;
      currentProject = project;
      selectMachine(r.machine);
    };
    recentMachinesList.appendChild(btn);
  });
}

// ---- 左：工事番号一覧（工程表の全件から作成） ----
async function loadTree() {
  sidebarStatus.textContent = "読み込み中...";
  try {
    const allProjects = await fetchProjectMachineTree();
    // 工事番号2000番台のみ表示（一時的な絞り込み）
    tree = allProjects.filter((project) => {
      const n = parseInt(project.num, 10);
      return !isNaN(n) && n >= 2000 && n <= 2999;
    });
    sidebarStatus.textContent = "";
    renderRecentMachines();
    renderSidebar();
    renderMain();
  } catch (err) {
    sidebarStatus.textContent = "読み込みエラー：" + err.message;
  }
}

sidebarSearchInput.addEventListener("input", () => {
  searchQuery = sidebarSearchInput.value.trim().toLowerCase();
  renderSidebar();
});

function renderSidebar() {
  sidebarList.innerHTML = "";
  const visibleProjects = searchQuery
    ? tree.filter((project) =>
        project.num.toLowerCase().includes(searchQuery) ||
        (project.customer || "").toLowerCase().includes(searchQuery))
    : tree;

  if (searchQuery && visibleProjects.length === 0) {
    const empty = document.createElement("div");
    empty.className = "sidebar-empty-msg";
    empty.textContent = "該当する案件が見つかりません";
    sidebarList.appendChild(empty);
  }

  visibleProjects.forEach((project) => {
    const projectDiv = document.createElement("div");
    projectDiv.className = "sidebar-project";

    const item = document.createElement("div");
    item.className = "sidebar-item" + (currentProject?.num === project.num ? " active" : "");

    const num = document.createElement("span");
    num.className = "sidebar-item-num";
    num.textContent = project.num;
    item.appendChild(num);

    if (project.customer) {
      const customer = document.createElement("span");
      customer.className = "sidebar-item-customer";
      customer.textContent = project.customer;
      item.appendChild(customer);
    }

    item.onclick = () => toggleProject(project);
    projectDiv.appendChild(item);

    if (currentProject?.num === project.num) {
      const machinesDiv = document.createElement("div");
      machinesDiv.className = "sidebar-machines";
      if (project.machines.length === 0) {
        const empty = document.createElement("div");
        empty.className = "sidebar-machine-empty";
        empty.textContent = "機械名の登録がありません";
        machinesDiv.appendChild(empty);
      } else {
        project.machines.forEach((machineName) => {
          const btn = document.createElement("button");
          btn.className = "sidebar-machine-btn" + (currentMachine === machineName ? " active" : "");
          btn.textContent = machineName;
          btn.onclick = () => selectMachine(machineName);
          machinesDiv.appendChild(btn);
        });
      }
      projectDiv.appendChild(machinesDiv);
    }

    sidebarList.appendChild(projectDiv);
  });
}

function toggleProject(project) {
  currentProject = currentProject?.num === project.num ? null : project;
  currentMachine = null;
  closePreview();
  renderSidebar();
  renderMain();
}

function selectMachine(machineName) {
  currentMachine = machineName;
  closePreview();
  saveRecentMachine(currentProject, machineName);
  renderSidebar();
  renderMain();
}

// ---- 右：メインエリア（機械名を選ぶとサムネイル一覧を表示） ----
function renderMain() {
  mainContent.innerHTML = "";

  if (!currentMachine) {
    const placeholder = document.createElement("div");
    placeholder.className = "main-placeholder";
    placeholder.textContent = "左の一覧から工事番号→機械名を選択してください";
    mainContent.appendChild(placeholder);
    return;
  }

  mainContent.appendChild(buildBreadcrumb());
  renderPartsView();
}

function buildBreadcrumb() {
  const breadcrumb = document.createElement("div");
  breadcrumb.className = "breadcrumb";

  const projectCrumb = document.createElement("span");
  projectCrumb.className = "crumb";
  projectCrumb.textContent = currentProject.customer
    ? `${currentProject.num}（${currentProject.customer}）`
    : currentProject.num;
  breadcrumb.appendChild(projectCrumb);

  const sep = document.createElement("span");
  sep.className = "sep";
  sep.textContent = "›";
  breadcrumb.appendChild(sep);

  const machineCrumb = document.createElement("span");
  machineCrumb.className = "crumb current";
  machineCrumb.textContent = currentMachine;
  breadcrumb.appendChild(machineCrumb);

  return breadcrumb;
}

let partsStatusEl = null;
let thumbColumnEl = null;

function renderPartsView() {
  const columns = document.createElement("div");
  columns.className = "content-columns";

  thumbColumnEl = document.createElement("div");
  thumbColumnEl.className = "thumb-column";

  partsStatusEl = document.createElement("div");
  partsStatusEl.className = "main-placeholder";
  thumbColumnEl.appendChild(partsStatusEl);

  columns.appendChild(thumbColumnEl);
  columns.appendChild(buildPreviewColumn());
  mainContent.appendChild(columns);

  loadMachineFiles();
}

// プレビュー列（プレースホルダー／実際の3Dビューア）を組み立てる
function buildPreviewColumn() {
  const previewColumn = document.createElement("div");
  previewColumn.className = "preview-column";

  previewPlaceholder = document.createElement("div");
  previewPlaceholder.id = "previewPlaceholder";
  previewPlaceholder.textContent = "サムネイルを選択してください";
  previewColumn.appendChild(previewPlaceholder);

  previewPanel = document.createElement("div");
  previewPanel.id = "previewPanel";

  const header = document.createElement("div");
  header.id = "previewHeader";

  const titleBlock = document.createElement("div");
  titleBlock.id = "previewTitleBlock";
  previewTitle = document.createElement("span");
  previewTitle.id = "previewTitle";
  previewMeta = document.createElement("span");
  previewMeta.id = "previewMeta";
  titleBlock.appendChild(previewTitle);
  titleBlock.appendChild(previewMeta);
  header.appendChild(titleBlock);

  const actions = document.createElement("div");
  actions.className = "actions";

  const bgGroup = document.createElement("div");
  bgGroup.className = "bg-swatch-group";
  const bgOptions = [
    { key: "dark", label: "暗い背景", cls: "bg-swatch-dark", color: 0x1a1a1a },
    { key: "gray", label: "グレー背景", cls: "bg-swatch-gray", color: 0x6b7280 },
    { key: "light", label: "明るい背景", cls: "bg-swatch-light", color: 0xf2f2f2 },
  ];
  bgOptions.forEach((opt) => {
    const swatchBtn = document.createElement("button");
    swatchBtn.className = "bg-swatch-btn " + opt.cls + (opt.key === "dark" ? " active" : "");
    swatchBtn.title = opt.label;
    swatchBtn.onclick = () => {
      selectedBackground = opt.color;
      currentViewer?.setBackground(opt.color);
      bgGroup.querySelectorAll(".bg-swatch-btn").forEach((b) => b.classList.remove("active"));
      swatchBtn.classList.add("active");
    };
    bgGroup.appendChild(swatchBtn);
  });
  actions.appendChild(bgGroup);

  const resetViewBtnEl = document.createElement("button");
  resetViewBtnEl.id = "resetViewBtn";
  resetViewBtnEl.title = "視点をリセット";
  resetViewBtnEl.innerHTML = ICON_RESET;
  resetViewBtnEl.onclick = () => currentViewer?.resetView();
  actions.appendChild(resetViewBtnEl);

  const fullscreenBtnEl = document.createElement("button");
  fullscreenBtnEl.id = "fullscreenBtn";
  fullscreenBtnEl.innerHTML = `${ICON_EXPAND}<span>全画面表示</span>`;
  fullscreenBtnEl.onclick = () => {
    if (!currentUrl) return;
    const params = new URLSearchParams({
      url: currentUrl,
      title: previewTitle.textContent || "",
      bg: "0x" + selectedBackground.toString(16).padStart(6, "0"),
    });
    window.open("viewer.html?" + params.toString(), "_blank");
  };
  actions.appendChild(fullscreenBtnEl);

  const closePreviewBtnEl = document.createElement("button");
  closePreviewBtnEl.id = "closePreviewBtn";
  closePreviewBtnEl.innerHTML = `${ICON_CLOSE}<span>閉じる</span>`;
  closePreviewBtnEl.onclick = closePreview;
  actions.appendChild(closePreviewBtnEl);

  header.appendChild(actions);
  previewPanel.appendChild(header);

  previewViewer = document.createElement("div");
  previewViewer.id = "previewViewer";
  previewStatus = document.createElement("div");
  previewStatus.id = "previewStatus";
  previewViewer.appendChild(previewStatus);
  previewPanel.appendChild(previewViewer);

  previewColumn.appendChild(previewPanel);
  return previewColumn;
}

async function loadMachineFiles() {
  if (!partsStatusEl || !thumbColumnEl) return;
  partsStatusEl.textContent = "読み込み中...";

  try {
    const files = await fetchMachineFiles(currentProject.num, currentMachine);
    thumbColumnEl.querySelectorAll(".part-card, .add-part-btn").forEach(el => el.remove());
    partsStatusEl.textContent = files.length === 0 ? "アップロード済みの3Dモデルはまだありません" : "";

    files.forEach((file) => thumbColumnEl.appendChild(buildPartCard(file)));

    const addBtn = document.createElement("button");
    addBtn.className = "add-part-btn";
    addBtn.innerHTML = `${ICON_PLUS}<span>アップロード</span>`;
    addBtn.onclick = openUploadModal;
    thumbColumnEl.appendChild(addBtn);
  } catch (err) {
    partsStatusEl.textContent = "読み込みエラー：" + err.message;
  }
}

function buildPartCard(file) {
  const card = document.createElement("div");
  card.className = "part-card";

  const thumbBtn = document.createElement("button");
  thumbBtn.className = "part-thumb-btn";
  if (file.thumbnail_url) {
    const img = document.createElement("img");
    img.className = "part-thumb";
    img.src = file.thumbnail_url;
    img.alt = "";
    thumbBtn.appendChild(img);
  } else {
    const placeholder = document.createElement("span");
    placeholder.className = "part-thumb-placeholder";
    placeholder.innerHTML = ICON_CUBE;
    thumbBtn.appendChild(placeholder);
  }
  thumbBtn.onclick = () => openPreview(file);
  card.appendChild(thumbBtn);

  const editLabel = document.createElement("label");
  editLabel.className = "part-edit-btn";
  editLabel.title = "サムネイルを変更";
  editLabel.innerHTML = ICON_EDIT;
  const editInput = document.createElement("input");
  editInput.type = "file";
  editInput.accept = "image/*";
  editInput.onchange = async () => {
    const chosen = editInput.files[0];
    if (!chosen) return;
    editLabel.innerHTML = "…";
    try {
      await updateThumbnail(file.id, chosen);
      await loadMachineFiles();
    } catch (err) {
      console.error(err);
      if (partsStatusEl) partsStatusEl.textContent = "サムネイルの更新に失敗しました：" + (err.message || err);
      editLabel.innerHTML = ICON_EDIT;
    }
  };
  editLabel.appendChild(editInput);
  card.appendChild(editLabel);

  const label = document.createElement("span");
  label.textContent = file.part_label || "表示";
  card.appendChild(label);

  return card;
}

// ---- インラインプレビュー ----
function openPreview(file) {
  currentViewer?.dispose();
  previewViewer.querySelectorAll("canvas").forEach(c => c.remove());

  currentUrl = file.file_url;
  previewTitle.textContent = `${currentMachine}　${file.part_label || ""}`;
  previewMeta.textContent = file.created_at ? `アップロード：${formatDateTime(file.created_at)}` : "";
  previewPlaceholder.style.display = "none";
  previewPanel.style.display = "flex";

  currentViewer = initViewer(previewViewer, file.file_url, {
    background: selectedBackground,
    onStatus: (msg) => { previewStatus.textContent = msg; },
  });
}

function closePreview() {
  currentViewer?.dispose();
  currentViewer = null;
  currentUrl = null;
  if (previewPanel) previewPanel.style.display = "none";
  if (previewPlaceholder) previewPlaceholder.style.display = "flex";
}

// ---- アップロードモーダル（選択中の工事番号・機械名に対してアップロードする） ----
function setUploadStatus(msg, kind) {
  uploadStatusEl.textContent = msg;
  uploadStatusEl.className = kind || "";
}

function openUploadModal() {
  uploadOverlay.style.display = "flex";
  setUploadStatus("");
  uploadContext.textContent = `案件：${currentProject.num}　機械名：${currentMachine}`;
}

function closeUploadModal() {
  uploadOverlay.style.display = "none";
  dropZone.textContent = dropZoneDefaultText;
}

cancelUploadBtn.onclick = closeUploadModal;

// ---- ドラッグ&ドロップで3Dファイルを選択 ----
const dropZoneDefaultText = dropZone.textContent;
["dragenter", "dragover"].forEach((evt) => {
  dropZone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
  });
});
["dragleave", "dragend"].forEach((evt) => {
  dropZone.addEventListener(evt, () => dropZone.classList.remove("dragover"));
});
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  const dropped = e.dataTransfer.files?.[0];
  if (!dropped) return;
  fileInput.files = e.dataTransfer.files;
  dropZone.textContent = `選択中：${dropped.name}`;
});
fileInput.addEventListener("change", () => {
  const chosen = fileInput.files?.[0];
  dropZone.textContent = chosen ? `選択中：${chosen.name}` : dropZoneDefaultText;
});

uploadBtn.addEventListener("click", async () => {
  const partLabel = partLabelInput.value.trim();
  const file = fileInput.files[0];
  const thumbnailFile = thumbnailInput.files[0];

  if (!file) return setUploadStatus("ファイルを選択してください", "error");

  uploadBtn.disabled = true;
  try {
    await uploadPart({
      projectNumber: currentProject.num,
      machineName: currentMachine,
      partLabel,
      file,
      thumbnailFile,
    }, (msg) => setUploadStatus(msg));
    setUploadStatus("アップロード完了しました！", "success");
    partLabelInput.value = "";
    fileInput.value = "";
    thumbnailInput.value = "";
    dropZone.textContent = dropZoneDefaultText;
    await loadMachineFiles();
    setTimeout(closeUploadModal, 800);
  } catch (err) {
    console.error(err);
    setUploadStatus("エラーが発生しました：" + (err.message || err), "error");
  } finally {
    uploadBtn.disabled = false;
  }
});

loadTree();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3Dキャプチャ 表示</title>
<style>
  body { margin: 0; background: #1a1a1a; font-family: sans-serif; }
  #info {
    position: absolute; top: 10px; left: 10px; color: #fff;
    background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px;
    font-size: 13px; z-index: 10;
  }
  #back {
    position: absolute; top: 10px; right: 10px; z-index: 10;
    padding: 8px 14px; background: #2d6cdf; color: #fff; border: none;
    border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
  }
}
</script>
</head>
<body>

<div id="info">読み込み中...</div>
<a id="back" href="list.html">一覧に戻る</a>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

const params = new URLSearchParams(window.location.search);
const splatURL = params.get("url");
const info = document.getElementById("info");

if (!splatURL) {
  info.textContent = "表示するファイルが指定されていません（一覧画面から開いてください）";
} else {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(
    60, window.innerWidth / window.innerHeight, 0.01, 1000
  );
  camera.position.set(0, 1, 3);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  const spark = new SparkRenderer({ renderer });
  scene.add(spark);

  const splat = new SplatMesh({ url: splatURL });
  splat.quaternion.set(1, 0, 0, 0);
  scene.add(splat);

  splat.initialized.then(() => {
    info.textContent = "表示成功";
  }).catch((err) => {
    info.textContent = "読み込み失敗：ファイルURLを確認してください";
    console.error(err);
  });

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  renderer.setAnimationLoop(() => {
    controls.update();
    renderer.render(scene, camera);
  });
}
</script>
</body>
</html>

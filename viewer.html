<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Model Capture</title>
<style>
  html, body { margin: 0; height: 100%; background: #1a1a1a; font-family: "Yu Gothic UI", "メイリオ", Meiryo, sans-serif; }
  #viewerContainer { position: absolute; inset: 0; }
  #topBar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,0));
  }
  #titleBlock { display: flex; flex-direction: column; gap: 2px; color: #fff; min-width: 0; }
  #info { font-size: 13px; }
  #meta { font-size: 11px; color: #c7ccd1; }
  #actions { display: flex; align-items: center; gap: 8px; }
  .bg-swatch-group { display: flex; gap: 4px; margin-right: 4px; }
  .bg-swatch-btn { width: 22px; height: 22px; border-radius: 50%; padding: 0; cursor: pointer; border: 2px solid transparent; }
  .bg-swatch-btn.active { border-color: #4d9de8; }
  .bg-swatch-dark { background: #1a1a1a; }
  .bg-swatch-light { background: #f2f2f2; }
  .bg-swatch-gray { background: #6b7280; }
  #actions > button, #actions > a {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; background: #333c42; color: #fff; border: none;
    border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none;
    transition: background .15s ease;
  }
  #actions > button:hover, #actions > a:hover { background: #454f57; }
  #actions .icon { width: 14px; height: 14px; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
  }
}
</script>
</head>
<body>

<div id="viewerContainer"></div>
<div id="topBar">
  <div id="titleBlock">
    <span id="info">読み込み中...</span>
    <span id="meta"></span>
  </div>
  <div id="actions">
    <div class="bg-swatch-group" id="bgGroup"></div>
    <button id="resetViewBtn" title="視点をリセット"></button>
    <a id="back" href="index.html"></a>
  </div>
</div>

<script type="module">
import { initViewer } from "./viewer-core.js";
import { ICON_RESET, ICON_CLOSE } from "./icons.js";

const params = new URLSearchParams(window.location.search);
const splatURL = params.get("url");
const title = params.get("title");
const bgParam = params.get("bg");

const info = document.getElementById("info");
const meta = document.getElementById("meta");
const container = document.getElementById("viewerContainer");
const resetViewBtn = document.getElementById("resetViewBtn");
const backLink = document.getElementById("back");
const bgGroup = document.getElementById("bgGroup");

resetViewBtn.innerHTML = ICON_RESET;
backLink.innerHTML = `${ICON_CLOSE}<span>一覧に戻る</span>`;

if (title) meta.textContent = title;

if (!splatURL) {
  info.textContent = "表示するファイルが指定されていません（一覧画面から開いてください）";
} else {
  const initialBackground = bgParam ? parseInt(bgParam, 16) : 0x1a1a1a;

  const bgOptions = [
    { key: "dark", cls: "bg-swatch-dark", color: 0x1a1a1a, label: "暗い背景" },
    { key: "gray", cls: "bg-swatch-gray", color: 0x6b7280, label: "グレー背景" },
    { key: "light", cls: "bg-swatch-light", color: 0xf2f2f2, label: "明るい背景" },
  ];

  const viewer = initViewer(container, splatURL, {
    background: initialBackground,
    onStatus: (msg) => { info.textContent = msg; },
  });

  bgOptions.forEach((opt) => {
    const btn = document.createElement("button");
    btn.className = "bg-swatch-btn " + opt.cls + (opt.color === initialBackground ? " active" : "");
    btn.title = opt.label;
    btn.onclick = () => {
      viewer.setBackground(opt.color);
      bgGroup.querySelectorAll(".bg-swatch-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
    };
    bgGroup.appendChild(btn);
  });

  resetViewBtn.onclick = () => viewer.resetView();
}
</script>
</body>
</html>
